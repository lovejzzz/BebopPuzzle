<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bebop Puzzle — Maker (Dev)</title>
    <style>
        /* ============================================
           RESET & DARK THEME
           ============================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-dark:    #0a0812;
            --bg-surface: #110e1a;
            --bg-card:    #1a1525;
            --bg-elevated:#241e33;
            --border:     rgba(167,139,250,0.12);
            --border-med: rgba(167,139,250,0.25);
            --text-primary:   #e8e2f0;
            --text-secondary: #9b8fb8;
            --text-dim:       #6b5f80;
            --accent:    #a78bfa;
            --accent-glow: rgba(167,139,250,0.25);
            --gold:      #f0a830;
            --gold-glow: rgba(240,168,48,0.3);
            --green:     #34d399;
            --red:       #f87171;
            --blue:      #5b8def;
        }
        html, body {
            height: 100%; overflow: hidden;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            user-select: none;
        }

        /* ============================================
           LAYOUT — 3-column grid
           ============================================ */
        .app {
            display: grid;
            grid-template-columns: 220px 1fr 280px;
            height: 100vh;
            gap: 0;
        }

        /* ============================================
           LEFT PANEL — Library
           ============================================ */
        .panel-left {
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .panel-header h2 {
            font-size: 11px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.12em;
            color: var(--text-secondary);
        }
        .panel-header .count {
            font-size: 10px; font-weight: 700;
            color: var(--text-dim);
            background: var(--bg-elevated);
            padding: 2px 8px; border-radius: 10px;
        }
        .library-list {
            flex: 1; overflow-y: auto; padding: 8px;
        }
        .library-list::-webkit-scrollbar { width: 4px; }
        .library-list::-webkit-scrollbar-track { background: transparent; }
        .library-list::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 4px; }

        .lib-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px; border-radius: 10px;
            cursor: pointer; transition: all 0.15s;
            border: 1px solid transparent;
            position: relative;
        }
        .lib-item:hover { background: var(--bg-card); border-color: var(--border); }
        .lib-item.active { background: var(--bg-elevated); border-color: var(--border-med); }
        .lib-item .thumb {
            width: 44px; height: 44px; border-radius: 8px;
            background: var(--bg-elevated); overflow: hidden; flex-shrink: 0;
            border: 1px solid var(--border);
        }
        .lib-item .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .lib-item .info { flex: 1; min-width: 0; }
        .lib-item .info .name {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .lib-item .info .label {
            font-size: 9px; font-weight: 600;
            text-transform: uppercase; color: var(--accent);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .lib-item .info .intervals {
            font-size: 8px; font-weight: 500; font-style: italic;
            color: var(--text-dim); margin-top: 2px;
        }
        .lib-item .del-btn {
            opacity: 0; transition: opacity 0.15s;
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; padding: 4px; font-size: 14px;
        }
        .lib-item:hover .del-btn { opacity: 1; }
        .lib-item .del-btn:hover { color: var(--red); }

        .lib-actions {
            padding: 12px; border-top: 1px solid var(--border);
            display: flex; gap: 6px;
        }
        .btn-sm {
            flex: 1; padding: 8px; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-secondary);
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.08em; border-radius: 8px; cursor: pointer;
            transition: all 0.15s; text-align: center;
        }
        .btn-sm:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border-med); }

        /* ============================================
           CENTER — Canvas
           ============================================ */
        .panel-center {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px; gap: 16px;
            background: var(--bg-dark);
            position: relative;
        }
        .toolbar {
            display: flex; gap: 4px; background: var(--bg-surface);
            padding: 4px; border-radius: 12px; border: 1px solid var(--border);
        }
        .tool-btn {
            width: 40px; height: 40px; border: none;
            background: transparent; color: var(--text-dim);
            border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; font-size: 16px;
        }
        .tool-btn:hover { background: var(--bg-card); color: var(--text-secondary); }
        .tool-btn.active { background: var(--accent); color: #fff; }
        .tool-btn svg { width: 18px; height: 18px; }

        .canvas-wrap {
            position: relative; width: 100%; max-width: 480px;
            aspect-ratio: 1;
            border-radius: 16px; overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 60px var(--accent-glow);
            border: 1px solid var(--border-med);
        }
        .canvas-wrap canvas {
            display: block; width: 100%; height: 100%;
            cursor: crosshair;
        }
        #snap-points-layer, #handles-layer, #marquee-el {
            position: absolute; inset: 0; pointer-events: none;
        }
        #handles-layer { pointer-events: auto; }
        .snap-marker {
            width: 6px; height: 6px;
            background: rgba(167,139,250,0.15);
            border-radius: 50%; position: absolute;
            transform: translate(-50%, -50%);
        }
        .handle {
            width: 14px; height: 14px;
            background: var(--accent); border: 2px solid #fff;
            border-radius: 50%; position: absolute;
            transform: translate(-50%, -50%);
            cursor: move; z-index: 50;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            pointer-events: auto;
        }
        .handle.active { box-shadow: 0 0 0 4px var(--accent-glow); }
        #marquee-el {
            display: none; border: 1px dashed var(--accent);
            background: rgba(167,139,250,0.08);
            pointer-events: none; z-index: 40;
        }

        .canvas-controls {
            display: flex; gap: 8px; align-items: center;
        }
        .canvas-controls .btn-icon {
            width: 36px; height: 36px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--bg-surface);
            color: var(--text-dim); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; font-size: 14px;
        }
        .canvas-controls .btn-icon:hover { color: var(--text-primary); border-color: var(--border-med); }
        .slider-group { display: flex; align-items: center; gap: 6px; }
        .slider-group label {
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            color: var(--text-dim); letter-spacing: 0.06em;
        }
        .slider-group input[type=range] {
            width: 80px; height: 4px; appearance: none;
            background: var(--bg-elevated); border-radius: 2px;
            outline: none;
        }
        .slider-group input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 12px; height: 12px;
            background: var(--accent); border-radius: 50%; cursor: pointer;
        }
        .slider-group .val {
            font-size: 10px; font-weight: 700; color: var(--accent);
            min-width: 20px; text-align: center;
        }
        .snap-toggle {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 8px;
            background: var(--bg-surface); border: 1px solid var(--border);
        }
        .snap-toggle label {
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            color: var(--text-dim); cursor: pointer;
        }
        .snap-toggle input { accent-color: var(--accent); cursor: pointer; }

        /* ============================================
           RIGHT PANEL — Piece Properties
           ============================================ */
        .panel-right {
            background: var(--bg-surface);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow-y: auto;
        }
        .panel-right::-webkit-scrollbar { width: 4px; }
        .panel-right::-webkit-scrollbar-track { background: transparent; }
        .panel-right::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 4px; }

        .prop-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        .prop-section h3 {
            font-size: 10px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--text-dim); margin-bottom: 12px;
        }
        .prop-row {
            display: flex; flex-direction: column; gap: 4px;
            margin-bottom: 10px;
        }
        .prop-row:last-child { margin-bottom: 0; }
        .prop-row label {
            font-size: 9px; font-weight: 700;
            text-transform: uppercase; color: var(--text-dim);
            letter-spacing: 0.06em;
        }
        .prop-row input[type=text], .prop-row input[type=number] {
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-primary); padding: 8px 10px;
            border-radius: 8px; font-size: 13px; font-weight: 500;
            outline: none; transition: border-color 0.15s;
        }
        .prop-row input:focus { border-color: var(--accent); }

        .label-pills {
            display: flex; gap: 4px; flex-wrap: wrap;
        }
        .label-pill {
            padding: 4px 8px; border-radius: 6px;
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            border: 1px solid var(--border); background: var(--bg-card);
            color: var(--text-secondary); cursor: pointer;
            transition: all 0.15s;
        }
        .label-pill:hover { border-color: var(--accent); color: var(--accent); }

        .entry-exit-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
        }

        .interval-section { }
        .interval-step { margin-bottom: 10px; }
        .interval-step .step-label {
            font-size: 9px; font-weight: 700; color: var(--text-dim);
            text-transform: uppercase; margin-bottom: 6px;
            display: flex; justify-content: space-between;
        }
        .interval-step .step-label .count { color: var(--accent); }
        .int-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
        }
        .int-box {
            padding: 6px 2px; text-align: center;
            font-size: 11px; font-weight: 700;
            border: 1px solid var(--border); border-radius: 6px;
            background: var(--bg-card); color: var(--text-secondary);
            cursor: pointer; transition: all 0.15s;
        }
        .int-box:hover { border-color: var(--border-med); color: var(--text-primary); }
        .int-box.selected {
            background: var(--accent); border-color: var(--accent);
            color: #fff;
        }

        .inv-toggle {
            display: flex; align-items: center; gap: 8px;
            margin-top: 8px;
        }
        .inv-toggle label {
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            color: var(--text-dim); cursor: pointer;
        }
        .inv-toggle input { accent-color: var(--accent); cursor: pointer; }

        /* Color picker */
        .color-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
        .color-dot {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid transparent; cursor: pointer;
            transition: all 0.15s;
        }
        .color-dot:hover { transform: scale(1.15); }
        .color-dot.selected { border-color: #fff; box-shadow: 0 0 8px var(--accent-glow); }

        /* Save button */
        .save-section {
            padding: 16px;
        }
        .btn-save {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, var(--accent) 0%, #8b6cf6 100%);
            color: #fff; font-size: 11px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.12em;
            border: none; border-radius: 10px; cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
        .btn-save:active { transform: scale(0.98); }

        .btn-new {
            width: 100%; padding: 10px; margin-top: 8px;
            background: var(--bg-card); color: var(--text-secondary);
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 1px solid var(--border); border-radius: 8px;
            cursor: pointer; transition: all 0.15s;
        }
        .btn-new:hover { background: var(--bg-elevated); color: var(--text-primary); }

        /* Toast */
        .toast {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); background: var(--bg-elevated);
            color: var(--text-primary); padding: 10px 20px;
            border-radius: 10px; font-size: 12px; font-weight: 600;
            border: 1px solid var(--border-med);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 9999; opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-box {
            background: var(--bg-card); border: 1px solid var(--border-med);
            border-radius: 16px; padding: 24px; width: 340px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }
        .modal-box h3 {
            font-size: 14px; font-weight: 800; text-transform: uppercase;
            color: var(--text-primary); margin-bottom: 8px;
        }
        .modal-box p {
            font-size: 12px; color: var(--text-secondary); margin-bottom: 16px;
        }
        .modal-box .btn-modal {
            width: 100%; padding: 10px; margin-bottom: 6px;
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            cursor: pointer; transition: all 0.15s; text-align: center;
        }
        .modal-box .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .modal-box .btn-primary:hover { opacity: 0.9; }
        .modal-box .btn-secondary { background: var(--bg-elevated); color: var(--text-secondary); }
        .modal-box .btn-secondary:hover { color: var(--text-primary); }
        .modal-box .btn-cancel { background: transparent; color: var(--text-dim); border: none; }
        .modal-box .btn-cancel:hover { color: var(--text-primary); }

        /* Dev badge */
        .dev-badge {
            position: fixed; top: 12px; left: 50%;
            transform: translateX(-50%);
            background: var(--bg-surface); border: 1px solid var(--border);
            padding: 4px 14px; border-radius: 8px;
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.15em; color: var(--text-dim);
            z-index: 100;
        }
        .dev-badge span { color: var(--red); }
    </style>
</head>
<body>

<div class="dev-badge">Bebop Puzzle <span>DEV</span> — Piece Maker</div>

<div class="app">
    <!-- LEFT: Library -->
    <div class="panel-left">
        <div class="panel-header">
            <h2>Library</h2>
            <span class="count" id="lib-count">0</span>
        </div>
        <div class="library-list" id="library-list"></div>
        <div class="lib-actions">
            <button class="btn-sm" onclick="exportLibraryJS()">Export JS</button>
            <button class="btn-sm" onclick="importLibraryJSON()">Import</button>
            <button class="btn-sm" onclick="exportLibraryJSON()">JSON</button>
        </div>
    </div>

    <!-- CENTER: Canvas -->
    <div class="panel-center">
        <div class="toolbar">
            <button class="tool-btn active" id="tool-select" onclick="setTool('select')" title="Select (1)">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2z"/></svg>
            </button>
            <button class="tool-btn" id="tool-line" onclick="setTool('line')" title="Line (2)">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2.5" d="M5 19L19 5"/></svg>
            </button>
            <button class="tool-btn" id="tool-dotted" onclick="setTool('dotted')" title="Dashed (3)">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2.5" stroke-dasharray="4 4" d="M5 19L19 5"/></svg>
            </button>
            <button class="tool-btn" id="tool-dot" onclick="setTool('dot')" title="Dot (4)">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="currentColor"/></svg>
            </button>
            <div style="width:1px;background:var(--border);margin:4px 2px;"></div>
            <button class="tool-btn" onclick="flipAction('h')" title="Flip H">↔</button>
            <button class="tool-btn" onclick="flipAction('v')" title="Flip V">↕</button>
            <button class="tool-btn" onclick="deleteSelected()" title="Delete" style="color:var(--red)">✕</button>
        </div>

        <div class="canvas-wrap" id="canvas-container">
            <canvas id="woodCanvas"></canvas>
            <div id="snap-points-layer"></div>
            <div id="handles-layer"></div>
            <div id="marquee-el"></div>
        </div>

        <div class="canvas-controls">
            <button class="btn-icon" onclick="undo()" title="Undo">↩</button>
            <button class="btn-icon" onclick="redo()" title="Redo">↪</button>
            <div style="width:1px;height:20px;background:var(--border);margin:0 4px;"></div>
            <div class="slider-group" id="width-control">
                <label>W</label>
                <input type="range" id="pathWidth" min="2" max="80" value="8" oninput="updateProp('width',this.value)">
                <span class="val" id="widthVal">8</span>
            </div>
            <div class="slider-group" id="seg-control" style="display:none;">
                <label>D</label>
                <input type="range" id="segments" min="1" max="15" value="4" oninput="updateProp('segments',this.value)">
                <span class="val" id="segVal">4</span>
            </div>
            <div class="snap-toggle">
                <input type="checkbox" id="snapToggle" checked>
                <label for="snapToggle">Snap</label>
            </div>
        </div>
    </div>

    <!-- RIGHT: Properties -->
    <div class="panel-right">
        <div class="prop-section">
            <h3>Piece Identity</h3>
            <div class="prop-row">
                <label>Name</label>
                <input type="text" id="piece-name" placeholder="e.g. Arpeggio">
            </div>
            <div class="prop-row">
                <label>Label</label>
                <input type="text" id="piece-label" placeholder="e.g. Ascending">
            </div>
            <div class="label-pills">
                <span class="label-pill" onclick="setLabel('Ascending')">Asc</span>
                <span class="label-pill" onclick="setLabel('Descending')">Desc</span>
                <span class="label-pill" onclick="setLabel('From Above')">Above</span>
                <span class="label-pill" onclick="setLabel('From Below')">Below</span>
            </div>
        </div>

        <div class="prop-section">
            <h3>Entry / Exit Y</h3>
            <div class="entry-exit-row">
                <div class="prop-row">
                    <label>Entry Y</label>
                    <input type="number" id="piece-entryY" step="0.1" min="0" max="1" value="0.5">
                </div>
                <div class="prop-row">
                    <label>Exit Y</label>
                    <input type="number" id="piece-exitY" step="0.1" min="0" max="1" value="0.5">
                </div>
            </div>
        </div>

        <div class="prop-section">
            <h3>Color</h3>
            <div class="color-row" id="color-picker"></div>
        </div>

        <div class="prop-section interval-section">
            <h3>Intervals</h3>
            <div class="interval-step">
                <div class="step-label">1→2 <span class="count" id="count-int1">0</span></div>
                <div class="int-grid" id="grid-int1"></div>
            </div>
            <div class="interval-step">
                <div class="step-label">2→3 <span class="count" id="count-int2">0</span></div>
                <div class="int-grid" id="grid-int2"></div>
            </div>
            <div class="interval-step">
                <div class="step-label">3→4 <span class="count" id="count-int3">0</span></div>
                <div class="int-grid" id="grid-int3"></div>
            </div>
            <div class="inv-toggle">
                <input type="checkbox" id="allow-inversions">
                <label for="allow-inversions">Allow Inversions</label>
            </div>
        </div>

        <div class="save-section">
            <button class="btn-save" onclick="saveToLibrary()">Save to Library</button>
            <button class="btn-new" onclick="newCanvas()">+ New Piece</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="library-data.js"></script>
<script>
// ============================================================
// STATE
// ============================================================
const S = {
    elements: [],
    library: [],
    history: [],
    redoStack: [],
    selectedIndices: [],
    clipboard: [],
    tool: 'select',
    canvasSize: 600,
    isDrawing: false,
    isMarquee: false,
    marqueeStart: { x: 0, y: 0 },
    snapLines: { x: null, y: null },
    intervals: { int1: new Set(), int2: new Set(), int3: new Set() },
    color: '#5d4037',
    activeLibIndex: -1,
};

const INTERVALS = ["Uni","m2","M2","m3","M3","P4","Trit","P5","m6","M6","m7","M7"];
const COLORS = [
    { n:'Brown', v:'#5d4037' }, { n:'Black', v:'#1f2937' },
    { n:'Blue', v:'#1d4ed8' },  { n:'Red', v:'#dc2626' },
    { n:'Green', v:'#16a34a' }, { n:'Purple', v:'#7c3aed' },
    { n:'Orange', v:'#ea580c' },
];
const TOOL_DEFAULTS = { line:{width:8}, dotted:{width:8,segments:4}, dot:{width:30} };

let canvas, ctx, container, handlesLayer, snapLayer, marqueeEl;
let woodGrain = null;

// ============================================================
// INIT
// ============================================================
function init() {
    canvas = document.getElementById('woodCanvas');
    ctx = canvas.getContext('2d');
    container = document.getElementById('canvas-container');
    handlesLayer = document.getElementById('handles-layer');
    snapLayer = document.getElementById('snap-points-layer');
    marqueeEl = document.getElementById('marquee-el');

    // Interval grids
    ['int1','int2','int3'].forEach(id => {
        const grid = document.getElementById(`grid-${id}`);
        INTERVALS.forEach(name => {
            const box = document.createElement('div');
            box.className = 'int-box';
            box.textContent = name;
            box.onclick = () => toggleInterval(id, name, box);
            grid.appendChild(box);
        });
    });

    // Color picker
    const cp = document.getElementById('color-picker');
    COLORS.forEach(c => {
        const d = document.createElement('div');
        d.className = 'color-dot' + (c.v === S.color ? ' selected' : '');
        d.style.backgroundColor = c.v;
        d.title = c.n;
        d.onclick = () => selectColor(c.v, d);
        cp.appendChild(d);
    });

    // Load library from library-data.js
    if (typeof DEFAULT_LIBRARY_DATA !== 'undefined' && DEFAULT_LIBRARY_DATA.library) {
        S.library = JSON.parse(JSON.stringify(DEFAULT_LIBRARY_DATA.library));
    }

    createSnapMarkers();
    resize();
    window.addEventListener('resize', resize);
    canvas.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    window.addEventListener('keydown', onKeyDown);
    renderLibrary();
    draw();
}

// ============================================================
// RESIZE
// ============================================================
function resize() {
    const rect = container.getBoundingClientRect();
    S.canvasSize = rect.width;
    canvas.width = S.canvasSize;
    canvas.height = S.canvasSize;
    woodGrain = null;
    draw();
}

function createSnapMarkers() {
    snapLayer.innerHTML = '';
    [{x:0,y:0},{x:.5,y:0},{x:1,y:0},{x:0,y:.5},{x:1,y:.5},{x:0,y:1},{x:.5,y:1},{x:1,y:1}].forEach(p => {
        const d = document.createElement('div');
        d.className = 'snap-marker';
        d.style.left = `${p.x*100}%`; d.style.top = `${p.y*100}%`;
        snapLayer.appendChild(d);
    });
}

// ============================================================
// TOOLS
// ============================================================
function setTool(t) {
    S.tool = t;
    S.selectedIndices = [];
    document.querySelectorAll('.toolbar .tool-btn').forEach(b => b.classList.remove('active'));
    const el = document.getElementById(`tool-${t}`);
    if (el) el.classList.add('active');
    updateUI(); draw();
}

// ============================================================
// POINTER EVENTS
// ============================================================
function onPointerDown(e) {
    if (e.target !== canvas) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / S.canvasSize;
    const my = (e.clientY - rect.top) / S.canvasSize;

    if (S.tool === 'select') {
        const found = findAt(mx, my);
        if (found !== -1) {
            if (!e.shiftKey) S.selectedIndices = [found];
            else {
                const idx = S.selectedIndices.indexOf(found);
                if (idx === -1) S.selectedIndices.push(found);
                else S.selectedIndices.splice(idx, 1);
            }
        } else {
            S.isMarquee = true;
            S.marqueeStart = { x: e.clientX, y: e.clientY };
            marqueeEl.style.display = 'block';
            marqueeEl.style.left = `${e.clientX-rect.left}px`;
            marqueeEl.style.top = `${e.clientY-rect.top}px`;
            marqueeEl.style.width = '0px'; marqueeEl.style.height = '0px';
            if (!e.shiftKey) S.selectedIndices = [];
        }
        updateUI(); draw(); return;
    }

    saveState();
    S.isDrawing = true;
    const sp = snap({x:mx, y:my});
    const cfg = TOOL_DEFAULTS[S.tool==='line'?'line':S.tool==='dotted'?'dotted':'dot'];
    S.elements.push({
        type: S.tool, p1:{...sp}, p2:{...sp},
        width: cfg.width, segments: cfg.segments||4, color: S.color
    });
    S.selectedIndices = [S.elements.length-1];
    updateUI(); draw();
}

function onPointerMove(e) {
    const rect = canvas.getBoundingClientRect();
    if (S.isDrawing) {
        let x = Math.max(0, Math.min(1, (e.clientX-rect.left)/S.canvasSize));
        let y = Math.max(0, Math.min(1, (e.clientY-rect.top)/S.canvasSize));
        const el = S.elements[S.selectedIndices[0]];
        const s = snap({x,y}, S.selectedIndices[0]);
        if (el.type==='dot') el.p1 = s; else el.p2 = s;
        draw();
    } else if (S.isMarquee) {
        const cx = e.clientX, cy = e.clientY;
        const l = Math.min(S.marqueeStart.x, cx), t = Math.min(S.marqueeStart.y, cy);
        const w = Math.abs(S.marqueeStart.x - cx), h = Math.abs(S.marqueeStart.y - cy);
        marqueeEl.style.left = `${l-rect.left}px`; marqueeEl.style.top = `${t-rect.top}px`;
        marqueeEl.style.width = `${w}px`; marqueeEl.style.height = `${h}px`;
    }
}

function onPointerUp(e) {
    if (S.isDrawing) {
        S.isDrawing = false;
        S.snapLines = {x:null, y:null};
        updateUI(); draw();
    } else if (S.isMarquee) {
        const x1 = parseInt(marqueeEl.style.left)/S.canvasSize;
        const y1 = parseInt(marqueeEl.style.top)/S.canvasSize;
        const x2 = x1 + parseInt(marqueeEl.style.width)/S.canvasSize;
        const y2 = y1 + parseInt(marqueeEl.style.height)/S.canvasSize;
        S.elements.forEach((el,i) => {
            const check = p => p.x>=x1&&p.x<=x2&&p.y>=y1&&p.y<=y2;
            if (el.type==='dot'?check(el.p1):(check(el.p1)||check(el.p2))) {
                if (!S.selectedIndices.includes(i)) S.selectedIndices.push(i);
            }
        });
        marqueeEl.style.display = 'none';
        S.isMarquee = false;
        updateUI(); draw();
    }
}

function findAt(x, y) {
    for (let i = S.elements.length-1; i >= 0; i--) {
        const el = S.elements[i];
        const th = el.type==='dot' ? Math.max(0.06, (el.width/S.canvasSize)*0.5+0.01) : 0.04;
        if (el.type==='dot') {
            if (Math.hypot(x-el.p1.x, y-el.p1.y) < th) return i;
        } else {
            if (Math.hypot(x-el.p1.x,y-el.p1.y)<0.05||Math.hypot(x-el.p2.x,y-el.p2.y)<0.05) return i;
            const l2=(el.p1.x-el.p2.x)**2+(el.p1.y-el.p2.y)**2;
            if (l2===0) { if(Math.hypot(x-el.p1.x,y-el.p1.y)<0.03) return i; continue; }
            let t=((x-el.p1.x)*(el.p2.x-el.p1.x)+(y-el.p1.y)*(el.p2.y-el.p1.y))/l2;
            t=Math.max(0,Math.min(1,t));
            if (Math.hypot(x-(el.p1.x+t*(el.p2.x-el.p1.x)),y-(el.p1.y+t*(el.p2.y-el.p1.y)))<0.03) return i;
        }
    }
    return -1;
}

function snap(pt, excludeIdx=-1) {
    S.snapLines = {x:null, y:null};
    if (!document.getElementById('snapToggle').checked) return pt;
    const targets = [0, 0.25, 0.5, 0.75, 1.0];
    let bx=pt.x, by=pt.y, mdx=0.03, mdy=0.03;
    targets.forEach(v => {
        if (Math.abs(pt.x-v)<mdx) { mdx=Math.abs(pt.x-v); bx=v; S.snapLines.x=v; }
        if (Math.abs(pt.y-v)<mdy) { mdy=Math.abs(pt.y-v); by=v; S.snapLines.y=v; }
    });
    S.elements.forEach((el,i) => {
        if (i===excludeIdx) return;
        const pts = el.type==='dot'?[el.p1]:[el.p1,el.p2];
        pts.forEach(p => {
            if (Math.hypot(pt.x-p.x,pt.y-p.y)<0.035) {
                bx=p.x; by=p.y; S.snapLines.x=p.x; S.snapLines.y=p.y;
            }
        });
    });
    return {x:bx, y:by};
}

// ============================================================
// KEYBOARD
// ============================================================
function onKeyDown(e) {
    const isInput = ['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName);
    if ((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey) { e.preventDefault(); undo(); return; }
    if ((e.ctrlKey||e.metaKey)&&(e.key==='Z'||e.key==='y')) { e.preventDefault(); redo(); return; }
    if (isInput) return;
    if (e.key==='Delete'||e.key==='Backspace') { deleteSelected(); return; }
    if ((e.ctrlKey||e.metaKey)&&e.key==='a') { e.preventDefault(); S.selectedIndices=S.elements.map((_,i)=>i); updateUI(); draw(); return; }
    if ((e.ctrlKey||e.metaKey)&&e.key==='s') { e.preventDefault(); saveToLibrary(); return; }
    if (e.key==='1') setTool('select');
    if (e.key==='2') setTool('line');
    if (e.key==='3') setTool('dotted');
    if (e.key==='4') setTool('dot');
    const nudge = e.shiftKey ? 0.05 : 0.01;
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key) && S.selectedIndices.length) {
        e.preventDefault(); saveState();
        const dx = e.key==='ArrowLeft'?-nudge:e.key==='ArrowRight'?nudge:0;
        const dy = e.key==='ArrowUp'?-nudge:e.key==='ArrowDown'?nudge:0;
        S.selectedIndices.forEach(i => {
            const el = S.elements[i];
            el.p1.x=Math.max(0,Math.min(1,el.p1.x+dx)); el.p1.y=Math.max(0,Math.min(1,el.p1.y+dy));
            if (el.p2) { el.p2.x=Math.max(0,Math.min(1,el.p2.x+dx)); el.p2.y=Math.max(0,Math.min(1,el.p2.y+dy)); }
        });
        updateUI(); draw();
    }
}

// ============================================================
// UNDO / REDO
// ============================================================
function saveState() {
    S.history.push(JSON.stringify(S.elements));
    if (S.history.length > 50) S.history.shift();
    S.redoStack = [];
}
function undo() {
    if (!S.history.length) return;
    S.redoStack.push(JSON.stringify(S.elements));
    S.elements = JSON.parse(S.history.pop());
    S.selectedIndices = []; updateUI(); draw();
}
function redo() {
    if (!S.redoStack.length) return;
    S.history.push(JSON.stringify(S.elements));
    S.elements = JSON.parse(S.redoStack.pop());
    S.selectedIndices = []; updateUI(); draw();
}

// ============================================================
// ELEMENT OPS
// ============================================================
function deleteSelected() {
    if (!S.selectedIndices.length) return;
    saveState();
    S.selectedIndices.sort((a,b)=>b-a).forEach(i=>S.elements.splice(i,1));
    S.selectedIndices = []; updateUI(); draw();
}

function flipAction(axis) {
    if (!S.elements.length) return;
    saveState();
    const targets = S.selectedIndices.length ? S.selectedIndices : S.elements.map((_,i)=>i);
    targets.forEach(i => {
        const el = S.elements[i];
        if (axis==='h') { el.p1.x=1-el.p1.x; if(el.type!=='dot') el.p2.x=1-el.p2.x; }
        else { el.p1.y=1-el.p1.y; if(el.type!=='dot') el.p2.y=1-el.p2.y; }
    });
    draw();
}

function updateProp(prop, val) {
    const v = parseInt(val);
    if (S.selectedIndices.length) S.selectedIndices.forEach(i => S.elements[i][prop]=v);
    else { const t=S.tool==='line'?'line':S.tool==='dotted'?'dotted':'dot'; TOOL_DEFAULTS[t][prop]=v; }
    if (prop==='segments') document.getElementById('segVal').textContent=v;
    if (prop==='width') document.getElementById('widthVal').textContent=v;
    draw();
}

function selectColor(v, el) {
    S.color = v;
    document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));
    el.classList.add('selected');
    if (S.selectedIndices.length) {
        saveState();
        S.selectedIndices.forEach(i=>S.elements[i].color=v);
        draw();
    }
}

function setLabel(l) { document.getElementById('piece-label').value = l; }

// ============================================================
// INTERVALS
// ============================================================
function toggleInterval(stepId, name, el) {
    if (S.intervals[stepId].has(name)) { S.intervals[stepId].delete(name); el.classList.remove('selected'); }
    else { S.intervals[stepId].add(name); el.classList.add('selected'); }
    updateIntervalCounts();
}
function updateIntervalCounts() {
    ['int1','int2','int3'].forEach(id => {
        document.getElementById(`count-${id}`).textContent = S.intervals[id].size;
    });
}
function clearIntervals() {
    ['int1','int2','int3'].forEach(id => {
        S.intervals[id].clear();
        document.querySelectorAll(`#grid-${id} .int-box`).forEach(b=>b.classList.remove('selected'));
    });
    updateIntervalCounts();
}

// ============================================================
// UI UPDATE
// ============================================================
function updateUI() {
    handlesLayer.innerHTML = '';
    const segCtrl = document.getElementById('seg-control');

    if (S.selectedIndices.length > 0) {
        const el = S.elements[S.selectedIndices[0]];
        document.getElementById('pathWidth').value = el.width;
        document.getElementById('widthVal').textContent = el.width;
        segCtrl.style.display = el.type==='dotted' ? 'flex' : 'none';
        if (el.type==='dotted') {
            document.getElementById('segments').value = el.segments;
            document.getElementById('segVal').textContent = el.segments;
        }
        if (S.selectedIndices.length===1 && S.tool==='select') {
            createHandle(el.p1, 'p1');
            if (el.type!=='dot') createHandle(el.p2, 'p2');
        }
    } else {
        segCtrl.style.display = 'none';
    }
}

function createHandle(pt, key) {
    const h = document.createElement('div');
    h.className = 'handle';
    h.style.left = `${pt.x*100}%`; h.style.top = `${pt.y*100}%`;
    h.onpointerdown = (e) => {
        e.stopPropagation(); saveState();
        h.setPointerCapture(e.pointerId); h.classList.add('active');
        const onMove = (em) => {
            const rect = container.getBoundingClientRect();
            let x = Math.max(0,Math.min(1,(em.clientX-rect.left)/S.canvasSize));
            let y = Math.max(0,Math.min(1,(em.clientY-rect.top)/S.canvasSize));
            const s = snap({x,y}, S.selectedIndices[0]);
            pt.x=s.x; pt.y=s.y;
            h.style.left=`${pt.x*100}%`; h.style.top=`${pt.y*100}%`;
            draw();
        };
        const onUp = () => {
            h.classList.remove('active'); S.snapLines={x:null,y:null};
            window.removeEventListener('pointermove',onMove);
            window.removeEventListener('pointerup',onUp);
            updateUI(); draw();
        };
        window.addEventListener('pointermove',onMove);
        window.addEventListener('pointerup',onUp);
    };
    handlesLayer.appendChild(h);
}

// ============================================================
// DRAWING
// ============================================================
function createWoodGrain() {
    const pc = document.createElement('canvas');
    pc.width = canvas.width; pc.height = canvas.height;
    const p = pc.getContext('2d');
    p.fillStyle = '#e3c191'; p.fillRect(0,0,pc.width,pc.height);
    p.globalAlpha = 0.35;
    for (let i=0;i<pc.width;i+=4) {
        p.beginPath(); p.lineWidth=1;
        p.strokeStyle = i%12===0?'#b98d5c':'#d4a373';
        p.moveTo(i,0); p.lineTo(i+(Math.random()*2-1),pc.height); p.stroke();
    }
    return pc;
}

function draw() {
    if (!ctx) return;
    if (!woodGrain) woodGrain = createWoodGrain();
    ctx.drawImage(woodGrain, 0, 0);

    // Snap lines
    if (S.snapLines.x!==null||S.snapLines.y!==null) {
        ctx.save(); ctx.setLineDash([5,5]); ctx.strokeStyle='rgba(167,139,250,0.5)'; ctx.lineWidth=1;
        if (S.snapLines.x!==null) { ctx.beginPath(); ctx.moveTo(S.snapLines.x*canvas.width,0); ctx.lineTo(S.snapLines.x*canvas.width,canvas.height); ctx.stroke(); }
        if (S.snapLines.y!==null) { ctx.beginPath(); ctx.moveTo(0,S.snapLines.y*canvas.height); ctx.lineTo(canvas.width,S.snapLines.y*canvas.height); ctx.stroke(); }
        ctx.restore();
    }

    // Border
    ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.lineWidth=12;
    ctx.strokeRect(6,6,canvas.width-12,canvas.height-12);

    // Elements
    S.elements.forEach((el,idx) => {
        ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
        const c = el.color||'#5d4037';
        ctx.strokeStyle=c; ctx.fillStyle=c; ctx.lineWidth=el.width;
        if (S.selectedIndices.includes(idx)) { ctx.shadowBlur=12; ctx.shadowColor='rgba(167,139,250,0.8)'; }
        const x1=el.p1.x*canvas.width, y1=el.p1.y*canvas.height;
        const x2=el.p2?.x*canvas.width, y2=el.p2?.y*canvas.height;
        if (el.type==='line') { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
        else if (el.type==='dotted') {
            const len=Math.hypot(x2-x1,y2-y1);
            if(len>0){const u=len/(2*el.segments-1);ctx.setLineDash([u,u]);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.setLineDash([]);}
        } else if (el.type==='dot') { ctx.beginPath(); ctx.arc(x1,y1,el.width/2,0,Math.PI*2); ctx.fill(); }
        ctx.restore();
    });
}

// ============================================================
// LIBRARY
// ============================================================
function renderLibrary() {
    const list = document.getElementById('library-list');
    list.innerHTML = '';
    document.getElementById('lib-count').textContent = S.library.length;

    if (S.library.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:40px 12px;color:var(--text-dim);font-size:11px;font-style:italic;">Library empty</div>';
        return;
    }

    S.library.forEach((piece, i) => {
        const div = document.createElement('div');
        div.className = 'lib-item' + (i===S.activeLibIndex?' active':'');
        div.onclick = () => loadPiece(i);

        const i1 = piece.intervals.int1.length ? piece.intervals.int1[0]+(piece.intervals.int1.length>1?'..':'') : '-';
        const i2 = piece.intervals.int2.length ? piece.intervals.int2[0]+(piece.intervals.int2.length>1?'..':'') : '-';
        const i3 = piece.intervals.int3.length ? piece.intervals.int3[0]+(piece.intervals.int3.length>1?'..':'') : '-';

        div.innerHTML = `
            <div class="thumb"><img src="${piece.thumbnail}" alt="${piece.name}"></div>
            <div class="info">
                <div class="name">${piece.name}</div>
                <div class="label">${piece.label||'—'}</div>
                <div class="intervals">${i1} / ${i2} / ${i3}</div>
            </div>
            <button class="del-btn" onclick="event.stopPropagation();removeLib(${i})">×</button>
        `;
        list.appendChild(div);
    });
}

function loadPiece(i) {
    saveState();
    const p = S.library[i];
    S.elements = JSON.parse(JSON.stringify(p.elements));
    S.selectedIndices = [];
    S.activeLibIndex = i;

    document.getElementById('piece-name').value = p.name;
    document.getElementById('piece-label').value = p.label || '';
    document.getElementById('piece-entryY').value = p.entryY ?? 0.5;
    document.getElementById('piece-exitY').value = p.exitY ?? 0.5;
    document.getElementById('allow-inversions').checked = p.allowInversions || false;

    clearIntervals();
    ['int1','int2','int3'].forEach(id => {
        (p.intervals[id]||[]).forEach(name => {
            S.intervals[id].add(name);
            document.querySelectorAll(`#grid-${id} .int-box`).forEach(b => {
                if (b.textContent===name) b.classList.add('selected');
            });
        });
    });
    updateIntervalCounts();
    renderLibrary();
    updateUI(); draw();
}

function removeLib(i) {
    S.library.splice(i, 1);
    if (S.activeLibIndex === i) S.activeLibIndex = -1;
    else if (S.activeLibIndex > i) S.activeLibIndex--;
    renderLibrary();
    toast('Piece removed');
}

function saveToLibrary() {
    if (!S.elements.length) { toast('Nothing to save'); return; }
    const name = document.getElementById('piece-name').value.trim() || 'Untitled';
    const label = document.getElementById('piece-label').value.trim() || '';
    const entryY = parseFloat(document.getElementById('piece-entryY').value) || 0.5;
    const exitY = parseFloat(document.getElementById('piece-exitY').value) || 0.5;
    const allowInv = document.getElementById('allow-inversions').checked;

    // Check duplicate
    const existIdx = S.library.findIndex(p => p.name===name && p.label===label);
    if (existIdx !== -1 && existIdx !== S.activeLibIndex) {
        showDuplicateModal(name, label, existIdx, entryY, exitY, allowInv);
        return;
    }

    doSave(name, label, entryY, exitY, allowInv, S.activeLibIndex !== -1 ? S.activeLibIndex : -1);
}

function doSave(name, label, entryY, exitY, allowInv, replaceIdx) {
    // Clear selection for clean thumbnail
    const oldSel = [...S.selectedIndices];
    S.selectedIndices = []; updateUI(); draw();

    const piece = {
        id: Date.now(), name, label, entryY, exitY,
        allowInversions: allowInv,
        intervals: {
            int1: Array.from(S.intervals.int1),
            int2: Array.from(S.intervals.int2),
            int3: Array.from(S.intervals.int3),
        },
        elements: JSON.parse(JSON.stringify(S.elements)),
        thumbnail: canvas.toDataURL('image/png', 0.5),
    };

    S.selectedIndices = oldSel; updateUI(); draw();

    if (replaceIdx >= 0) {
        S.library[replaceIdx] = piece;
        S.activeLibIndex = replaceIdx;
    } else {
        S.library.unshift(piece);
        S.activeLibIndex = 0;
    }
    renderLibrary();
    toast('Saved!');
}

function newCanvas() {
    if (S.elements.length) {
        showConfirmModal('Start new piece? Current canvas will be cleared.', () => {
            doNewCanvas();
        });
    } else doNewCanvas();
}

function doNewCanvas() {
    saveState();
    S.elements = []; S.selectedIndices = []; S.activeLibIndex = -1;
    document.getElementById('piece-name').value = '';
    document.getElementById('piece-label').value = '';
    document.getElementById('piece-entryY').value = '0.5';
    document.getElementById('piece-exitY').value = '0.5';
    document.getElementById('allow-inversions').checked = false;
    clearIntervals(); renderLibrary(); updateUI(); draw();
    toast('New canvas');
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportLibraryJS() {
    // Export as library-data.js format
    const data = { version: 1, exportDate: new Date().toISOString(), library: S.library };
    const js = `const DEFAULT_LIBRARY_DATA = ${JSON.stringify(data, null, 2)};\n`;
    downloadBlob(js, 'library-data.js', 'application/javascript');
    toast('Exported library-data.js');
}

function exportLibraryJSON() {
    const data = { version: 1, exportDate: new Date().toISOString(), library: S.library };
    downloadBlob(JSON.stringify(data,null,2), 'bebop-library.json', 'application/json');
    toast('Exported JSON');
}

function importLibraryJSON() {
    const input = document.createElement('input');
    input.type='file'; input.accept='.json,.js';
    input.onchange = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                let text = ev.target.result;
                // Handle JS format: strip "const ... = " prefix
                const jsonStart = text.indexOf('{');
                if (jsonStart > 0) text = text.substring(jsonStart).replace(/;\s*$/, '');
                const data = JSON.parse(text);
                if (data.library && Array.isArray(data.library)) {
                    S.library = [...S.library, ...data.library];
                    renderLibrary();
                    toast(`Imported ${data.library.length} pieces`);
                }
            } catch(err) { toast('Import failed: invalid file'); }
        };
        reader.readAsText(file);
    };
    input.click();
}

function downloadBlob(content, filename, type) {
    const blob = new Blob([content], {type});
    const link = document.createElement('a');
    link.download = filename;
    link.href = URL.createObjectURL(blob);
    link.click();
    URL.revokeObjectURL(link.href);
}

// ============================================================
// MODALS
// ============================================================
function showDuplicateModal(name, label, existIdx, entryY, exitY, allowInv) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
        <div class="modal-box">
            <h3>Duplicate Found</h3>
            <p>"<strong>${name}</strong>" / "<strong>${label||'—'}</strong>" already exists.</p>
            <button class="btn-modal btn-primary" id="modal-overwrite">Overwrite Existing</button>
            <button class="btn-modal btn-secondary" id="modal-new">Save as New Copy</button>
            <button class="btn-modal btn-cancel" id="modal-cancel">Cancel</button>
        </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#modal-overwrite').onclick = () => { overlay.remove(); doSave(name,label,entryY,exitY,allowInv,existIdx); };
    overlay.querySelector('#modal-new').onclick = () => { overlay.remove(); doSave(name+' (copy)',label,entryY,exitY,allowInv,-1); };
    overlay.querySelector('#modal-cancel').onclick = () => overlay.remove();
}

function showConfirmModal(msg, onOk) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
        <div class="modal-box">
            <h3>Confirm</h3>
            <p>${msg}</p>
            <button class="btn-modal btn-primary" id="modal-ok">Confirm</button>
            <button class="btn-modal btn-cancel" id="modal-cancel">Cancel</button>
        </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#modal-ok').onclick = () => { overlay.remove(); onOk(); };
    overlay.querySelector('#modal-cancel').onclick = () => overlay.remove();
}

// ============================================================
// TOAST
// ============================================================
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}
