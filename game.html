// PUZZLE GENERATOR — builds random valid puzzle from template
// ==================================================================
function generateRandomPuzzle(template) {
    const VALID_POS = [0, 0.5, 1.0, 1.5];
    const MAX_ATTEMPTS = 300;

    for (let attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
        // 1. Pick random pieces for each chain slot
        const pieces = [];
        for (let i = 0; i < template.len; i++) {
            const baseName = template.pool[Math.floor(Math.random() * template.pool.length)];
            const fm = FLIP_MAP[baseName];
            const isFlipped = Math.random() < 0.5;
            const label = isFlipped ? fm.flipH : fm.defaultLabel;
            pieces.push({ baseName, label });
        }

        // 2. Ensure newPiece appears at least once in the chain
        if (template.newPc) {
            const hasNew = pieces.some(p => p.baseName === template.newPc);
            if (!hasNew) {
                const slot = Math.floor(Math.random() * template.len);
                const fm = FLIP_MAP[template.newPc];
                const isFlipped = Math.random() < 0.5;
                pieces[slot] = { baseName: template.newPc, label: isFlipped ? fm.flipH : fm.defaultLabel };
            }
        }

        // 3. Try to find a valid start position
        let positions = null;
        const startOptions = [...VALID_POS];
        // Shuffle start positions for variety
        for (let i = startOptions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [startOptions[i], startOptions[j]] = [startOptions[j], startOptions[i]];
        }

        for (const startPos of startOptions) {
            const posArr = [startPos];
            let valid = true;

            for (let i = 0; i < template.len - 1; i++) {
                const key = pieces[i].baseName + '|' + pieces[i].label;
                const rule = PIECE_RULES[key];
                if (!rule) { valid = false; break; }

                const nextKey = pieces[i + 1].baseName + '|' + pieces[i + 1].label;
                const nextRule = PIECE_RULES[nextKey];
                if (!nextRule) { valid = false; break; }

                // Connection: pos_A + exit_A = pos_B + entry_B
                const nextPos = posArr[i] + rule.exit - nextRule.entry;
                if (!VALID_POS.includes(nextPos)) { valid = false; break; }
                posArr.push(nextPos);
            }

            if (!valid) continue;

            // 4. Compute target position
            const lastIdx = template.len - 1;
            const lastKey = pieces[lastIdx].baseName + '|' + pieces[lastIdx].label;
            const lastRule = PIECE_RULES[lastKey];
            if (!lastRule) continue;

            // Target: pos_last + exit_last = targetPos + 0.5
            const targetPos = posArr[lastIdx] + lastRule.exit - 0.5;
            if (!VALID_POS.includes(targetPos)) continue;

            positions = posArr;

            // 5. Select removeCols
            const allCols = Array.from({length: template.len}, (_, i) => i);
            // Shuffle columns
            for (let i = allCols.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allCols[i], allCols[j]] = [allCols[j], allCols[i]];
            }

            let removeCols;
            if (template.newPc) {
                // Ensure at least one removed col has the new piece
                const newPieceCols = [];
                const otherCols = [];
                for (const c of allCols) {
                    if (pieces[c].baseName === template.newPc) newPieceCols.push(c);
                    else otherCols.push(c);
                }
                if (newPieceCols.length === 0) { positions = null; break; } // retry entire attempt
                removeCols = [newPieceCols[0]];
                const remaining = [...newPieceCols.slice(1), ...otherCols];
                for (let i = removeCols.length; i < template.rem; i++) {
                    if (remaining.length > 0) removeCols.push(remaining.shift());
                }
            } else {
                removeCols = allCols.slice(0, template.rem);
            }

            if (removeCols.length < template.rem) { positions = null; continue; }
            removeCols.sort((a, b) => a - b);

            // 6. Build trayBasePieces — unique base names of removed pieces
            const traySet = new Set();
            removeCols.forEach(c => traySet.add(pieces[c].baseName));
            const trayBasePieces = [...traySet];

            // 7. Pick random chords
            const { chords, targetChord } = pickRandomChords(template.len);

            // 8. Build solution array
            const solution = pieces.map((p, i) => ({
                col: i,
                pieceName: p.baseName,
                pieceLabel: p.label,
                position: positions[i]
            }));

            return {
                id: template.id,
                chapter: template.ch,
                name: template.name,
                chords,
                targetChord,
                solution,
                targetPiece: { position: targetPos },
                removeCols,
                trayBasePieces,
                hints: template.hints,
                timeThreshold: template.time,
                tutorial: template.tutorial || ''
            };
        }
        // If positions null, retry with new random pieces
    }

    // Fallback — should rarely happen; return a minimal valid puzzle
    console.warn('Generator exhausted attempts for', template.id, '— using fallback');
    const fm = FLIP_MAP[template.pool[0]];
    const fallbackPieces = [];
    for (let i = 0; i < template.len; i++) {
        fallbackPieces.push({ baseName: template.pool[0], label: i % 2 === 0 ? fm.defaultLabel : fm.flipH });
    }
    // Alternating Ascending/Descending arpeggios always connect at the same position
    const fallbackPos = new Array(template.len).fill(1.0);
    const removeCols = Array.from({length: template.rem}, (_, i) => i);
    const { chords, targetChord } = pickRandomChords(template.len);
    const traySet = new Set();
    removeCols.forEach(c => traySet.add(fallbackPieces[c].baseName));
    return {
        id: template.id, chapter: template.ch, name: template.name,
        chords, targetChord,
        solution: fallbackPieces.map((p, i) => ({ col: i, pieceName: p.baseName, pieceLabel: p.label, position: fallbackPos[i] })),
        targetPiece: { position: 1.5 },
        removeCols, trayBasePieces: [...traySet],
        hints: template.hints, timeThreshold: template.time,
        tutorial: template.tutorial || ''
    };
}

const CHAPTERS = [
    { id:1, name:"Arpeggios",  icon:"♪", unlockStars:0,  color:"gold",   reward:null },
    { id:2, name:"Neighbors",  icon:"♫", unlockStars:12, color:"purple", reward:"Neighbor" },
    { id:3, name:"Approaches", icon:"♬", unlockStars:20, color:"blue",   reward:"Approach" },
    { id:4, name:"Enclosures", icon:"🎷", unlockStars:20, color:"green",  reward:"Enclosure" },
    { id:5, name:"All Mixed",  icon:"🎵", unlockStars:20, color:"red",    reward:null }
];

// ==================================================================
// FLIP MAPPING — base piece → flipped variants
// ==================================================================
const FLIP_MAP = {
    'Arpeggio':  { defaultLabel: 'Ascending',  flipH: 'Descending' },
    'Approach':  { defaultLabel: 'Ascending',  flipH: 'Descending' },
    'Neighbor':  { defaultLabel: 'From Above', flipH: 'From Below' },
    'Enclosure': { defaultLabel: 'From Above', flipH: 'From Below' },
};

function getFlippedLabel(baseName, flipH) {
    const map = FLIP_MAP[baseName];
    if (!map) return '';
    let label = map.defaultLabel;
    if (flipH && map.flipH) label = map.flipH;
    return label;
}

// ==================================================================
// GAME STATE
// ==================================================================
let library = [];
let numCols = 4;
let gridState = {};
let currentLevel = null;
let currentLevelData = null;
let levelStartTime = 0;
let hintsUsed = 0;
let wrongPlacements = 0;
let hintsRemaining = 3;
let currentHintCol = null;
let currentHintLevel = 0;
let timerInterval = null;

// Per-piece flip state (parallel array to trayAvailable, true = flipped)
let trayFlipState = [];
let trayAvailable = [];      // mutable list of base piece names in tray
let draggedTrayIndex = -1;   // index into trayAvailable being dragged (-1 if from grid)

let draggedPiece = null;
let draggedFromGrid = null;
let draggedFromCraft = false;
let dragPreview = null;
let currentSnapCol = null;
let currentSnapPos = null;
let cellSize = 0;
let fullMelodyNotes = null;
let gameProgress = {};

function initGridState() {
    gridState = {};
    for (let i = 0; i <= numCols; i++) gridState[i] = null;
}

// ==================================================================
// SAVE / LOAD
// ==================================================================
function saveProgress() {
    try { localStorage.setItem('bebopPuzzleGame', JSON.stringify(gameProgress)); } catch(e) {}
}

function loadProgress() {
    try {
        const saved = localStorage.getItem('bebopPuzzleGame');
        if (saved) gameProgress = JSON.parse(saved);
    } catch(e) { gameProgress = {}; }
}

function getLevelProgress(levelId) { return gameProgress[levelId] || { stars:0, completed:false }; }

function getChapterStars(chapterId) {
    return LEVELS.filter(l => l.chapter === chapterId)
        .reduce((sum, l) => sum + (getLevelProgress(l.id).stars || 0), 0);
}

function getTotalStars() {
    return LEVELS.reduce((sum, l) => sum + (getLevelProgress(l.id).stars || 0), 0);
}

function isChapterUnlocked(chapterId) {
    if (chapterId === 1) return true;
    const prev = chapterId - 1;
    return getChapterStars(prev) >= CHAPTERS.find(c => c.id === chapterId).unlockStars;
}

function isLevelUnlocked(level) {
    if (!isChapterUnlocked(level.chapter)) return false;
    const chapterLevels = LEVELS.filter(l => l.chapter === level.chapter);
    const idx = chapterLevels.indexOf(level);
    if (idx === 0) return true;
    return getLevelProgress(chapterLevels[idx - 1].id).completed;
}

// ==================================================================
// SCREEN MANAGEMENT
// ==================================================================
function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => {
        s.classList.remove('active');
        s.classList.add('hidden');
    });
    const target = document.getElementById('screen-' + name);
    if (target) {
        target.classList.remove('hidden');
        target.classList.add('active');
    }
    if (name === 'map') renderMap();
}

function goToMap() {
    stopPlayback();
    hideCraftTable();
    trayFlipState = [];
    trayAvailable = [];
    if (timerInterval) clearInterval(timerInterval);
    document.getElementById('tutorial-bar').classList.add('hidden');
    // Remember which chapter tab to show
    if (currentLevelData) activeChapterTab = currentLevelData.chapter;
    showScreen('map');
}

// ==================================================================
// CHAPTER MAP — Tabbed layout
// ==================================================================
let activeChapterTab = 1;

const COLOR_MAP = {
    gold:   { bg: 'rgba(240,168,48,0.08)', border: 'rgba(240,168,48,0.15)', css: 'var(--gold)' },
    blue:   { bg: 'rgba(91,141,239,0.08)',  border: 'rgba(91,141,239,0.15)', css: '#5b8def' },
    purple: { bg: 'rgba(167,139,250,0.08)', border: 'rgba(167,139,250,0.15)', css: '#a78bfa' },
    green:  { bg: 'rgba(52,211,153,0.08)',  border: 'rgba(52,211,153,0.15)', css: '#34d399' },
    red:    { bg: 'rgba(248,113,113,0.08)', border: 'rgba(248,113,113,0.15)', css: '#f87171' },
};

function renderMap() {
    document.getElementById('total-stars-display').textContent = '★ ' + getTotalStars();

    // Render tabs
    const tabsEl = document.getElementById('map-tabs');
    tabsEl.innerHTML = CHAPTERS.map(ch => {
        const unlocked = isChapterUnlocked(ch.id);
        const isActive = ch.id === activeChapterTab;
        const cls = 'map-tab' + (isActive ? ' active' : '') + (unlocked ? '' : ' locked');
        return `<button class="${cls}" onclick="switchChapterTab(${ch.id})" data-chapter="${ch.id}">
            <span class="tab-icon">${ch.icon}</span>
            ${ch.name}
            ${unlocked ? '' : '<span class="tab-lock">🔒</span>'}
        </button>`;
    }).join('');

    // Render active chapter content
    renderChapterContent(activeChapterTab);
}

function switchChapterTab(chapterId) {
    const unlocked = isChapterUnlocked(chapterId);
    if (!unlocked) {
        const ch = CHAPTERS.find(c => c.id === chapterId);
        showToast(`Earn ${ch.unlockStars} ★ in Ch.${chapterId - 1} to unlock`, 'info');
        return;
    }
    activeChapterTab = chapterId;

    // Update tab active states
    document.querySelectorAll('.map-tab').forEach(tab => {
        tab.classList.toggle('active', parseInt(tab.dataset.chapter) === chapterId);
    });

    renderChapterContent(chapterId);
}

function renderChapterContent(chapterId) {
    const ch = CHAPTERS.find(c => c.id === chapterId);
    const unlocked = isChapterUnlocked(chapterId);
    const content = document.getElementById('map-chapter-content');

    if (!unlocked) {
        const colors = COLOR_MAP[ch.color] || COLOR_MAP.gold;
        content.innerHTML = `
            <div class="chapter-lock-banner">
                <div class="lock-icon">🔒</div>
                <div class="lock-text">${ch.name} is locked</div>
                <div class="lock-req">Earn ${ch.unlockStars} ★ in Ch.${chapterId - 1} to unlock</div>
            </div>`;
        return;
    }

    const stars = getChapterStars(chapterId);
    const levels = LEVELS.filter(l => l.chapter === chapterId);
    const maxStars = levels.length * 3;
    const colors = COLOR_MAP[ch.color] || COLOR_MAP.gold;
    const pct = maxStars > 0 ? Math.round((stars / maxStars) * 100) : 0;

    content.innerHTML = `
        <div class="chapter-info">
            <div class="chapter-info-header">
                <div class="chapter-info-icon" style="background:${colors.bg}; border: 1px solid ${colors.border};">
                    ${ch.icon}
                </div>
                <div style="flex:1;">
                    <div class="chapter-info-name" style="color:${colors.css};">${ch.name}</div>
                    <div class="chapter-info-stars">★ ${stars} / ${maxStars}</div>
                </div>
            </div>
            <div class="chapter-progress-bar">
                <div class="chapter-progress-fill" style="width:${pct}%; background:${colors.css};"></div>
            </div>
        </div>
        <div class="chapter-levels">
            ${levels.map(l => renderLevelNode(l)).join('')}
        </div>`;
}

function renderLevelNode(level) {
    const prog = getLevelProgress(level.id);
    const unlocked = isLevelUnlocked(level);
    const chapterLevels = LEVELS.filter(l => l.chapter === level.chapter);
    const num = chapterLevels.indexOf(level) + 1;

    if (!unlocked) {
        return `<div class="level-node locked-node">
            <div class="level-num">${num}</div>
            <div class="level-name">${level.name}</div>
        </div>`;
    }

    if (prog.completed) {
        const starStr = '<span style="color:var(--gold);">★</span>'.repeat(prog.stars)
            + '<span style="color:var(--text-muted);">★</span>'.repeat(3 - prog.stars);
        const perfClass = prog.stars === 3 ? ' perfected' : '';
        return `<div class="level-node completed${perfClass}" onclick="startLevel('${level.id}')">
            <div class="level-num">${num}</div>
            <div class="level-name">${level.name}</div>
            <div class="level-stars-display">${starStr}</div>
        </div>`;
    }

    return `<div class="level-node playable" onclick="startLevel('${level.id}')">
        <div class="level-num">${num}</div>
        <div class="level-name">${level.name}</div>
        <div class="level-stars-display" style="color:var(--text-muted);">· · ·</div>
    </div>`;
}

// ==================================================================
// PUZZLE: LOAD LEVEL
// ==================================================================
function startLevel(levelId) {
    const template = LEVEL_TEMPLATES.find(t => t.id === levelId);
    if (!template) return;

    // Tutorial levels use hardcoded puzzles; others are generated fresh
    if (TUTORIAL_LEVELS[levelId]) {
        currentLevelData = JSON.parse(JSON.stringify(TUTORIAL_LEVELS[levelId]));
    } else {
        currentLevelData = generateRandomPuzzle(template);
    }
    if (!currentLevelData) return;
    currentLevel = levelId;
    numCols = currentLevelData.chords.length;
    initGridState();

    // Place solution pieces
    currentLevelData.solution.forEach(s => {
        const piece = findPiece(s.pieceName, s.pieceLabel);
        if (piece) {
            gridState[s.col] = { piece, position: s.position, selectedIntervals: selectRandomIntervals(piece) };
        }
    });

    // Place target
    const targetPiece = library.find(p => p.name === 'Target');
    if (targetPiece) {
        gridState[numCols] = { piece: targetPiece, position: currentLevelData.targetPiece.position, selectedIntervals: {} };
    }

    // Compute melody before removing
    fullMelodyNotes = computeFullMelodyNotes();

    // Remove pieces for puzzle
    currentLevelData.removeCols.forEach(col => { gridState[col] = null; });

    // Reset tray & craft
    hideCraftTable();
    trayAvailable = [...(currentLevelData.trayBasePieces || [])];
    trayFlipState = new Array(trayAvailable.length).fill(false);

    // Reset stats
    hintsUsed = 0;
    wrongPlacements = 0;
    hintsRemaining = currentLevelData.hints || 3;
    currentHintCol = null;
    currentHintLevel = 0;
    levelStartTime = Date.now();

    showScreen('puzzle');
    document.getElementById('puzzle-level-name').textContent = `Ch.${currentLevelData.chapter} — ${currentLevelData.name}`;
    updateStarsDisplay();
    updateHintButton();

    requestAnimationFrame(() => {
        buildGrid();
        renderGrid();
        applyHighlights();
        renderTray();
        startTimer();

        // Always show craft table — needed for flipping and duplicating
        showCraftTable();

        if (currentLevelData.tutorial) {
            showTutorial(currentLevelData.tutorial);
        }
    });
}

function findPiece(name, label) {
    return library.find(p => p.name === name && p.label === label);
}

function computeFullMelodyNotes() {
    const chords = [];
    const allChords = [...currentLevelData.chords, currentLevelData.targetChord];
    for (let i = 0; i <= numCols; i++) chords.push(parseChord(allChords[i]));

    let targetNote = null;
    if (gridState[numCols] && chords[numCols]) {
        targetNote = getTargetNote(gridState[numCols].position, chords[numCols]);
    }

    const pieceNotes = [];
    for (let i = 0; i < numCols; i++) pieceNotes.push([]);
    let nextTarget = targetNote;

    for (let col = numCols - 1; col >= 0; col--) {
        if (gridState[col] && gridState[col].piece && gridState[col].piece.name !== 'Target') {
            const notes = calculatePieceNotes(gridState[col].piece, chords[col], nextTarget, gridState[col].selectedIntervals || {});
            pieceNotes[col] = notes;
            if (notes.length > 0) nextTarget = notes[0];
        }
    }
    return { pieceNotes, targetNote };
}

// ==================================================================
// PUZZLE: GRID RENDERING
// ==================================================================
function buildGrid() {
    const totalCols = numCols + 1;

    // Chord row
    const chordRow = document.getElementById('chord-row');
    chordRow.innerHTML = '';
    chordRow.style.gridTemplateColumns = `repeat(${totalCols}, minmax(0, 1fr))`;
    const allChords = [...currentLevelData.chords, currentLevelData.targetChord];
    for (let i = 0; i < totalCols; i++) {
        const label = document.createElement('div');
        label.className = 'chord-label' + (i === numCols ? ' target-chord' : '');
        label.textContent = allChords[i];
        chordRow.appendChild(label);
    }

    // Grid
    const grid = document.getElementById('melody-grid');
    grid.innerHTML = '';
    grid.style.gridTemplateColumns = `repeat(${totalCols}, minmax(0, 1fr))`;

    for (let col = 0; col < totalCols; col++) {
        const colDiv = document.createElement('div');
        colDiv.className = 'grid-column' + (col === numCols ? ' target-column' : '');
        colDiv.dataset.col = col;
        for (let row = 0; row < 3; row++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.dataset.col = col;
            cell.dataset.row = row;
            colDiv.appendChild(cell);
        }
        grid.appendChild(colDiv);
    }
    sizeCells();
}

function sizeCells() {
    const puzzleArea = document.querySelector('.puzzle-area');
    if (!puzzleArea) return;
    const grid = document.getElementById('melody-grid');
    if (!grid) return;

    const areaH = puzzleArea.clientHeight;
    const chordH = document.getElementById('chord-row')?.offsetHeight || 0;
    const availH = areaH - chordH - 32;
    const cellGap = window.innerWidth <= 480 ? 8 : 12;
    const cellFromH = Math.floor((availH - cellGap * 2) / 3);

    const totalCols = numCols + 1;
    const gridW = puzzleArea.clientWidth - 32;
    const cellFromW = Math.floor((gridW - (totalCols - 1) * cellGap) / totalCols);

    const size = Math.max(36, Math.min(cellFromH, cellFromW, 140));

    document.querySelectorAll('.grid-cell').forEach(c => {
        c.style.height = size + 'px';
    });

    const totalW = size * totalCols + (totalCols - 1) * cellGap;
    grid.style.maxWidth = totalW + 'px';
    grid.style.margin = '0 auto';
    document.getElementById('chord-row').style.maxWidth = totalW + 'px';
    document.getElementById('chord-row').style.margin = '0 auto';

    updateCellSize();
}

function renderGrid() {
    document.querySelectorAll('.placed-piece').forEach(p => p.remove());
    document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('occupied'));

    const cellGap = window.innerWidth <= 480 ? 8 : 12;

    for (let col = 0; col <= numCols; col++) {
        if (!gridState[col]) continue;
        const { piece, position } = gridState[col];
        const column = document.querySelector(`.grid-column[data-col="${col}"]`);
        if (!column) continue;

        const firstCell = column.querySelector('.grid-cell');
        const cellHeight = firstCell ? firstCell.offsetHeight : 100;
        const topOffset = position * (cellHeight + cellGap);

        const el = document.createElement('div');
        el.className = 'placed-piece';
        if (col === numCols && position < 0) el.classList.add('glass');
        el.style.top = topOffset + 'px';
        el.style.height = cellHeight + 'px';
        el.innerHTML = `<img src="${piece.thumbnail}" draggable="false">`;

        if (isPuzzleCol(col)) {
            el.style.cursor = 'grab';
            el.addEventListener('mousedown', e => { e.stopPropagation(); startDrag(e, piece, {col, position}); });
            el.addEventListener('touchstart', e => { e.stopPropagation(); startDragTouch(e, piece, {col, position}); }, {passive:false});
        }

        column.appendChild(el);
        const sr = Math.floor(position), er = Math.ceil(position);
        for (let r = sr; r <= Math.min(er,2); r++) {
            const c = column.querySelector(`.grid-cell[data-row="${r}"]`); if (c) c.classList.add('occupied');
        }
    }
}

function applyHighlights() {
    document.querySelectorAll('.col-empty,.col-locked').forEach(el => {
        el.classList.remove('col-empty','col-locked');
    });
    const emptyCols = new Set(currentLevelData.removeCols.filter(c => !gridState[c]));
    for (let c = 0; c <= numCols; c++) {
        const colEl = document.querySelector(`.grid-column[data-col="${c}"]`);
        if (!colEl) continue;
        if (emptyCols.has(c)) colEl.classList.add('col-empty');
        else if (gridState[c] && !isPuzzleCol(c)) colEl.classList.add('col-locked');
    }
}

function isEmptyCol(col) {
    return currentLevelData && currentLevelData.removeCols.includes(col) && !gridState[col];
}

function isPuzzleCol(col) {
    return currentLevelData && currentLevelData.removeCols.includes(col);
}

function isSolved(col) {
    if (!gridState[col]) return false;
    const answer = currentLevelData.solution.find(s => s.col === col);
    if (!answer) return false;
    const {piece, position} = gridState[col];
    return piece.name === answer.pieceName && piece.label === answer.pieceLabel && Math.abs(position - answer.position) < 0.01;
}

function updateCellSize() {
    const c = document.querySelector('.grid-cell');
    if (c) cellSize = c.offsetWidth;
}

// ==================================================================
// PIECE TRAY  (flip toggle lives on each card, drag directly)
// ==================================================================
function renderTray() {
    const tray = document.getElementById('piece-tray');
    tray.innerHTML = '';
    if (!currentLevelData) return;

    // Render one card per entry in trayAvailable (duplicates = multiple cards)
    trayAvailable.forEach((baseName, idx) => {
        const map = FLIP_MAP[baseName];
        if (!map) return;
        const piece = findPiece(baseName, map.defaultLabel);
        if (!piece) return;

        const isFlipped = !!trayFlipState[idx];
        const label = getFlippedLabel(baseName, isFlipped);

        const card = document.createElement('div');
        card.className = 'tray-piece';
        card.dataset.baseName = baseName;

        const flipStyle = isFlipped ? ' style="transform:scaleX(-1)"' : '';
        card.innerHTML = `
            <div class="tray-piece-thumb">
                <img src="${piece.thumbnail}" draggable="false"${flipStyle}>
            </div>
            <div class="tray-piece-label">${baseName}</div>
            <div class="tray-piece-variant">${label}</div>
        `;

        // Drag from card
        card.addEventListener('mousedown', e => {
            const p = findPiece(baseName, label);
            if (!p) return;
            e.preventDefault();
            draggedTrayIndex = idx;
            card.classList.add('dragging');
            startDrag(e, p, null);
        });
        card.addEventListener('touchstart', e => {
            const p = findPiece(baseName, label);
            if (!p) return;
            e.preventDefault();
            draggedTrayIndex = idx;
            card.classList.add('dragging');
            startDragTouch(e, p, null);
        }, {passive: false});

        tray.appendChild(card);
    });
}

// ==================================================================
// CRAFT TABLE  (right-side duplication board)
// ==================================================================
let craftBaseName = null;
let craftFlipH = false;
let craftOutputPiece = null;   // the duplicated piece ready to drag
let craftOpen = false;

function showCraftTable() {
    const table = document.getElementById('craft-table');
    table.classList.add('visible');
    craftOpen = true;

    // Show onboarding hint the first time
    if (!localStorage.getItem('bebopCraftOnboard')) {
        const hint = document.createElement('div');
        hint.className = 'craft-onboard';
        hint.innerHTML = `
            <div class="craft-onboard-icon">⇌</div>
            <div class="craft-onboard-title">Craft Table</div>
            <div class="craft-onboard-desc">Drag a piece here to <strong>flip</strong> its direction or <strong>duplicate</strong> it to get extra copies.</div>
            <div class="craft-onboard-tap">tap to continue</div>
        `;
        hint.addEventListener('click', () => {
            hint.style.opacity = '0';
            hint.style.transition = 'opacity 0.3s ease';
            setTimeout(() => hint.remove(), 300);
            localStorage.setItem('bebopCraftOnboard', '1');
        });
        table.appendChild(hint);
    }
}

function hideCraftTable() {
    document.getElementById('craft-table').classList.remove('visible');
    craftOpen = false;
    clearCraftTable();
}

function clearCraftTable() {
    craftBaseName = null;
    craftFlipH = false;
    craftOutputPiece = null;

    const dz = document.getElementById('craft-drop-zone');
    dz.innerHTML = '<div class="craft-drop-hint">Drop piece<br>here</div>';
    dz.classList.remove('has-piece', 'flipped', 'duplicating', 'flip-phase-out', 'flip-phase-in', 'consuming');

    document.getElementById('craft-piece-label').textContent = '';
    document.getElementById('craft-variant-label').textContent = '';
    document.getElementById('craft-flip-btn').classList.remove('ready', 'active');
    document.getElementById('craft-dupe-btn').classList.remove('ready');

    clearCraftOutput();
}

function clearCraftOutput() {
    const output = document.getElementById('craft-output');
    output.innerHTML = '<div class="craft-output-empty-hint">···</div>';
    output.style.animation = '';
    output.classList.remove('has-piece', 'popping-in', 'flying', 'claimable');
    craftOutputPiece = null;
    const hint = document.getElementById('craft-claim-hint');
    if (hint) hint.classList.remove('visible');
}

function placePieceInCraft(baseName, flipState) {
    craftBaseName = baseName;
    craftFlipH = !!flipState;
    craftOutputPiece = null;
    updateCraftDrop();
    document.getElementById('craft-flip-btn').classList.add('ready');
    document.getElementById('craft-dupe-btn').classList.add('ready');
    clearCraftOutput();
}

function updateCraftDrop() {
    if (!craftBaseName) return;
    const map = FLIP_MAP[craftBaseName];
    if (!map) return;
    const label = getFlippedLabel(craftBaseName, craftFlipH);
    const defaultPiece = findPiece(craftBaseName, map.defaultLabel);

    const dz = document.getElementById('craft-drop-zone');
    dz.classList.add('has-piece');
    dz.classList.toggle('flipped', craftFlipH);
    if (defaultPiece) {
        dz.innerHTML = `<img src="${defaultPiece.thumbnail}" draggable="false">`;
    }

    document.getElementById('craft-piece-label').textContent = craftBaseName;
    document.getElementById('craft-variant-label').textContent = label;
    document.getElementById('craft-flip-btn').classList.toggle('active', craftFlipH);
}

function showOutputPiece(baseName, flipH) {
    const map = FLIP_MAP[baseName];
    if (!map) return;
    const defaultPiece = findPiece(baseName, map.defaultLabel);
    if (!defaultPiece) return;

    const output = document.getElementById('craft-output');
    output.innerHTML = `<img src="${defaultPiece.thumbnail}" draggable="false" style="${flipH ? 'transform:scaleX(-1);' : ''}">`;
    output.classList.add('has-piece', 'popping-in');
    craftOutputPiece = { baseName, flipH };

    spawnSparkles(output, 3);

    // After pop-in, transition to shining claimable state
    setTimeout(() => {
        output.classList.remove('popping-in');
        output.classList.add('claimable');
        // Show "tap to claim" hint
        const hint = document.getElementById('craft-claim-hint');
        if (hint) hint.classList.add('visible');

        // Make result draggable to puzzle board
        output.style.cursor = 'grab';
        output.addEventListener('mousedown', craftOutputDragStart);
        output.addEventListener('touchstart', craftOutputTouchStart, {passive: false});
    }, 450);
}

function craftOutputDragStart(e) {
    const output = document.getElementById('craft-output');
    if (!craftOutputPiece || !output.classList.contains('claimable')) return;
    e.preventDefault();
    e.stopPropagation();
    const { baseName, flipH } = craftOutputPiece;
    const label = getFlippedLabel(baseName, flipH);
    const piece = findPiece(baseName, label);
    if (!piece) return;
    draggedFromCraft = true;
    startDrag(e, piece, null);
}

function craftOutputTouchStart(e) {
    const output = document.getElementById('craft-output');
    if (!craftOutputPiece || !output.classList.contains('claimable')) return;
    e.preventDefault();
    e.stopPropagation();
    const { baseName, flipH } = craftOutputPiece;
    const label = getFlippedLabel(baseName, flipH);
    const piece = findPiece(baseName, label);
    if (!piece) return;
    draggedFromCraft = true;
    startDragTouch(e, piece, null);
}

function claimOutputPiece() {
    const output = document.getElementById('craft-output');
    if (!craftOutputPiece || !output.classList.contains('claimable')) return;
    sfx('claim');

    const { baseName, flipH } = craftOutputPiece;

    // Hide claim hint
    const hint = document.getElementById('craft-claim-hint');
    if (hint) hint.classList.remove('visible');

    // Fly animation
    output.classList.remove('claimable');
    output.style.animation = 'craft-output-fly 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards';
    spawnSparkles(output, 4);

    // After fly: add to tray + clear
    setTimeout(() => {
        // For flip: 1 piece back. For duplicate: 2 pieces back.
        // The caller sets craftOutputPiece.dupeMode to know which.
        if (craftOutputPiece && craftOutputPiece.dupeMode) {
            trayAvailable.push(baseName);
            trayFlipState.push(flipH);
            trayAvailable.push(baseName);
            trayFlipState.push(flipH);
        } else {
            trayAvailable.push(baseName);
            trayFlipState.push(flipH);
        }
        clearCraftTable();
        renderTray();
    }, 650);
}

function craftToggleFlip() {
    if (!craftBaseName) return;
    sfx('flip');
    const baseName = craftBaseName;
    const dz = document.getElementById('craft-drop-zone');

    // Disable buttons during animation
    document.getElementById('craft-flip-btn').classList.remove('ready');
    document.getElementById('craft-dupe-btn').classList.remove('ready');

    // Phase 1: Rotate out to edge-on (0.3s)
    dz.classList.remove('flip-phase-out', 'flip-phase-in', 'consuming');
    void dz.offsetWidth;
    dz.classList.add('flip-phase-out');
    spawnSparkles(dz, 4);

    // At edge-on (card invisible): swap the image
    setTimeout(() => {
        craftFlipH = !craftFlipH;
        const label = getFlippedLabel(baseName, craftFlipH);
        const defaultPiece = findPiece(baseName, FLIP_MAP[baseName]?.defaultLabel);
        if (defaultPiece) {
            dz.innerHTML = `<img src="${defaultPiece.thumbnail}" draggable="false"${craftFlipH ? ' style="transform:scaleX(-1)"' : ''}>`;
        }
        document.getElementById('craft-variant-label').textContent = label;
        document.getElementById('craft-flip-btn').classList.toggle('active', craftFlipH);

        // Phase 2: Rotate in from other side (0.3s)
        dz.classList.remove('flip-phase-out');
        void dz.offsetWidth;
        dz.classList.add('flip-phase-in');
    }, 300);

    // After flip-in completes: start consume dissolve
    setTimeout(() => {
        dz.classList.remove('flip-phase-in');
        void dz.offsetWidth;
        dz.classList.add('consuming');
        spawnSparkles(dz, 4);

        // After dissolve: clear input, show result in output
        setTimeout(() => {
            const flippedFlipH = craftFlipH;

            // Clear the input zone
            dz.innerHTML = '<div class="craft-drop-hint">Drop piece<br>here</div>';
            dz.classList.remove('has-piece', 'flipped', 'consuming');
            document.getElementById('craft-piece-label').textContent = '';
            document.getElementById('craft-variant-label').textContent = '';
            craftBaseName = null;

            // Show flipped piece in output box — user clicks to claim
            showOutputPiece(baseName, flippedFlipH);
        }, 650);
    }, 650);
}

function craftDuplicate() {
    if (!craftBaseName) return;
    sfx('dupe');
    const baseName = craftBaseName;
    const flipH = craftFlipH;
    const label = getFlippedLabel(baseName, flipH);
    const piece = findPiece(baseName, label);
    if (!piece) return;

    // Disable buttons during animation
    document.getElementById('craft-flip-btn').classList.remove('ready');
    document.getElementById('craft-dupe-btn').classList.remove('ready');

    // Step 1: Shake + glow on the input (it stays!)
    const dz = document.getElementById('craft-drop-zone');
    dz.classList.remove('duplicating');
    void dz.offsetWidth;
    dz.classList.add('duplicating');
    spawnSparkles(dz, 6);

    // Step 2: After shake, dissolve original + show duplicate in output
    setTimeout(() => {
        dz.classList.remove('duplicating');
        spawnSparkles(dz, 3);

        // Dissolve the original in the drop zone
        dz.classList.remove('consuming');
        void dz.offsetWidth;
        dz.classList.add('consuming');

        // After dissolve, clear input and show result — user clicks to claim
        setTimeout(() => {
            dz.innerHTML = '<div class="craft-drop-hint">Drop piece<br>here</div>';
            dz.classList.remove('has-piece', 'flipped', 'consuming');
            document.getElementById('craft-piece-label').textContent = '';
            document.getElementById('craft-variant-label').textContent = '';
            craftBaseName = null;

            // Show duplicate in output, mark as dupe mode so claim gives 2 pieces
            showOutputPiece(baseName, flipH);
            if (craftOutputPiece) craftOutputPiece.dupeMode = true;
        }, 650);
    }, 900);
}

function spawnSparkles(el, count) {
    const rect = el.getBoundingClientRect();
    for (let i = 0; i < count; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'craft-sparkle';
        sparkle.style.left = (rect.left + Math.random() * rect.width) + 'px';
        sparkle.style.top = (rect.top + Math.random() * rect.height) + 'px';
        sparkle.style.animationDelay = (Math.random() * 0.3) + 's';
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 800);
    }
}

function initCraftOutput() {
    // Output box is now purely visual — pieces auto-fly to tray
}

function isCraftDrop(clientX, clientY) {
    if (!craftOpen) return false;
    const dz = document.getElementById('craft-drop-zone');
    const rect = dz.getBoundingClientRect();
    return clientX >= rect.left && clientX <= rect.right &&
           clientY >= rect.top && clientY <= rect.bottom;
}

// ==================================================================
// DRAG & DROP
// ==================================================================
function getValidSnapPositions(piece, colIndex) {
    let allPositions = [0, 0.5, 1, 1.5, 2];
    if (colIndex === numCols) allPositions = [-0.5, 0, 0.5, 1, 1.5, 2, 2.5];

    const pEntry = piece.entryY !== undefined ? piece.entryY : 0.5;
    const pExit = piece.exitY !== undefined ? piece.exitY : 0.5;

    let tempCleared = null;
    if (draggedFromGrid) {
        tempCleared = { col: draggedFromGrid.col, data: gridState[draggedFromGrid.col] };
        gridState[draggedFromGrid.col] = null;
    }

    const left = colIndex > 0 ? gridState[colIndex - 1] : null;
    const right = colIndex < numCols ? gridState[colIndex + 1] : null;
    const hasLeft = left && left.piece;
    const hasRight = right && right.piece;

    const result = allPositions.map(pos => {
        let valid = true;
        if (hasLeft) {
            const lExit = left.piece.exitY !== undefined ? left.piece.exitY : 0.5;
            if (Math.abs((left.position + lExit) - (pos + pEntry)) > 0.01) valid = false;
        }
        if (hasRight) {
            const rEntry = right.piece.entryY !== undefined ? right.piece.entryY : 0.5;
            if (Math.abs((pos + pExit) - (right.position + rEntry)) > 0.01) valid = false;
        }
        return { pos, valid };
    });

    if (tempCleared) gridState[tempCleared.col] = tempCleared.data;
    return result;
}

function startDrag(e, piece, fromGrid) {
    e.preventDefault();
    draggedPiece = piece;
    draggedFromGrid = fromGrid;
    const firstCell = document.querySelector('.grid-cell');
    if (firstCell) cellSize = firstCell.offsetWidth;

    dragPreview = document.createElement('div');
    dragPreview.className = 'drag-preview';
    dragPreview.style.width = cellSize + 'px';
    dragPreview.style.height = cellSize + 'px';
    dragPreview.innerHTML = `<img src="${piece.thumbnail}" draggable="false">`;
    document.body.appendChild(dragPreview);
    updateDragPreview(e.clientX, e.clientY);

    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);
}

function startDragTouch(e, piece, fromGrid) {
    e.preventDefault();
    const touch = e.touches[0];
    draggedPiece = piece;
    draggedFromGrid = fromGrid;
    const firstCell = document.querySelector('.grid-cell');
    if (firstCell) cellSize = firstCell.offsetWidth;

    dragPreview = document.createElement('div');
    dragPreview.className = 'drag-preview';
    dragPreview.style.width = cellSize + 'px';
    dragPreview.style.height = cellSize + 'px';
    dragPreview.innerHTML = `<img src="${piece.thumbnail}" draggable="false">`;
    document.body.appendChild(dragPreview);
    updateDragPreview(touch.clientX, touch.clientY);

    document.addEventListener('touchmove', onTouchMove, {passive:false});
    document.addEventListener('touchend', onTouchEnd);
}

function updateDragPreview(x, y) {
    if (dragPreview) {
        dragPreview.style.left = (x - cellSize/2) + 'px';
        dragPreview.style.top = (y - cellSize/2) + 'px';
    }
}

function processDragAt(x, y) {
    document.querySelector('.snap-preview')?.remove();
    document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('drag-over'));

    const cellGap = window.innerWidth <= 480 ? 8 : 12;
    let foundSnap = false;

    document.querySelectorAll('.grid-column').forEach(col => {
        const rect = col.getBoundingClientRect();
        const colIndex = parseInt(col.dataset.col);
        if (x < rect.left || x > rect.right) return;
        if (colIndex === numCols) return;
        if (draggedPiece.name === 'Target') return;
        if (!isEmptyCol(colIndex) && !draggedFromGrid && !draggedFromCraft) return;

        const cells = col.querySelectorAll('.grid-cell');
        const cellH = cells[0].offsetHeight;
        const relY = y - rect.top;
        const positions = getValidSnapPositions(draggedPiece, colIndex);

        let closest = null, closestDist = Infinity, closestValid = false;
        positions.forEach(({pos, valid}) => {
            const posY = pos * (cellH + cellGap);
            const dist = Math.abs(relY - posY - cellH/2);
            if (dist < closestDist) { closestDist = dist; closest = pos; closestValid = valid; }
        });

        if (closest !== null) {
            const preview = document.createElement('div');
            preview.className = 'snap-preview' + (closestValid ? '' : ' invalid');
            preview.style.top = (closest * (cellH + cellGap)) + 'px';
            preview.style.height = cellH + 'px';
            col.appendChild(preview);
            if (closestValid) { currentSnapCol = colIndex; currentSnapPos = closest; foundSnap = true; }
            else { currentSnapCol = null; currentSnapPos = null; }
        }
    });

    if (!foundSnap) { currentSnapCol = null; currentSnapPos = null; }

    // Craft table drop zone hover
    const craftDZ = document.getElementById('craft-drop-zone');
    if (craftOpen && craftDZ) {
        craftDZ.classList.toggle('drag-hover', isCraftDrop(x, y));
    }
}

function onDragMove(e) {
    updateDragPreview(e.clientX, e.clientY);
    processDragAt(e.clientX, e.clientY);
}

function onTouchMove(e) {
    e.preventDefault();
    const touch = e.touches[0];
    updateDragPreview(touch.clientX, touch.clientY);
    processDragAt(touch.clientX, touch.clientY);
}

function finishDrag(clientX, clientY) {
    document.querySelector('.snap-preview')?.remove();
    document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('drag-over'));
    document.querySelectorAll('.tray-piece').forEach(t => t.classList.remove('dragging'));
    document.getElementById('craft-drop-zone')?.classList.remove('drag-hover');

    // If dragged from craft output
    if (draggedFromCraft && draggedPiece) {
        if (craftOpen && clientX && clientY && isCraftDrop(clientX, clientY)) {
            // Dropped back on the craft drop zone
            const baseName = craftOutputPiece ? craftOutputPiece.baseName : draggedPiece.name;
            const flipState = craftOutputPiece ? craftOutputPiece.flipH : false;
            if (craftOutputPiece && craftOutputPiece.dupeMode) {
                // Duplicate mode: one copy goes to tray, other stays in craft
                trayAvailable.push(baseName);
                trayFlipState.push(flipState);
                renderTray();
            }
            clearCraftOutput();
            placePieceInCraft(baseName, flipState);
        } else if (currentSnapCol !== null && currentSnapPos !== null) {
            const canPlace = isPuzzleCol(currentSnapCol) && !gridState[currentSnapCol];
            if (canPlace) {
                sfx('claim');
                const sel = selectRandomIntervals(draggedPiece);
                gridState[currentSnapCol] = { piece: draggedPiece, position: currentSnapPos, selectedIntervals: sel };
                sfx('place');
                // Handle dupe mode: add extra piece to tray
                if (craftOutputPiece && craftOutputPiece.dupeMode) {
                    trayAvailable.push(craftOutputPiece.baseName);
                    trayFlipState.push(craftOutputPiece.flipH);
                }
                clearCraftTable();
                renderTray();
                renderGrid();
                applyHighlights();
                checkAnswer(currentSnapCol);
            }
        } else {
            // Dropped on nothing — just do normal claim to tray
            claimOutputPiece();
        }
        if (dragPreview) { dragPreview.remove(); dragPreview = null; }
        draggedPiece = null; draggedFromGrid = null; draggedFromCraft = false;
        currentSnapCol = null; currentSnapPos = null; draggedTrayIndex = -1;
        return;
    }

    // Check if dropped on the craft table drop zone
    if (craftOpen && draggedPiece && clientX && clientY && isCraftDrop(clientX, clientY)) {
        // Place piece into craft table
        const baseName = draggedPiece.name;
        const flipState = draggedTrayIndex >= 0 ? !!trayFlipState[draggedTrayIndex] : false;
        placePieceInCraft(baseName, flipState);

        // Consume from tray if it was a tray drag
        if (draggedTrayIndex >= 0) {
            trayAvailable.splice(draggedTrayIndex, 1);
            trayFlipState.splice(draggedTrayIndex, 1);
        }

        // Remove from grid if dragged from grid
        if (draggedFromGrid) {
            gridState[draggedFromGrid.col] = null;
        }

        renderTray();
        renderGrid();
        applyHighlights();

        if (dragPreview) { dragPreview.remove(); dragPreview = null; }
        draggedPiece = null; draggedFromGrid = null; draggedFromCraft = false;
        currentSnapCol = null; currentSnapPos = null; draggedTrayIndex = -1;
        return;
    }

    // Normal grid placement
    if (currentSnapCol !== null && currentSnapPos !== null && draggedPiece) {
        if (draggedFromGrid) gridState[draggedFromGrid.col] = null;
        const canPlace = isPuzzleCol(currentSnapCol) && (!gridState[currentSnapCol] || (draggedFromGrid && draggedFromGrid.col === currentSnapCol));
        if (canPlace) {
            const sel = selectRandomIntervals(draggedPiece);
            gridState[currentSnapCol] = { piece: draggedPiece, position: currentSnapPos, selectedIntervals: sel };
            sfx('place');

            // Consume the piece from the tray
            if (draggedTrayIndex >= 0) {
                trayAvailable.splice(draggedTrayIndex, 1);
                trayFlipState.splice(draggedTrayIndex, 1);
            }

            renderTray();
            renderGrid();
            applyHighlights();
            checkAnswer(currentSnapCol);
        } else if (draggedFromGrid) {
            // Can't place here, put piece back
            gridState[draggedFromGrid.col] = { piece: draggedPiece, position: draggedFromGrid.position, selectedIntervals: selectRandomIntervals(draggedPiece) };
            renderGrid();
            applyHighlights();
        }
    } else if (draggedFromGrid && !currentSnapCol) {
        // Dropped on nothing — return piece to tray and clear grid slot
        gridState[draggedFromGrid.col] = null;
        const map = FLIP_MAP[draggedPiece.name];
        const wasFlipped = map && map.flipH && draggedPiece.label === map.flipH;
        trayAvailable.push(draggedPiece.name);
        trayFlipState.push(!!wasFlipped);
        renderTray();
        renderGrid();
        applyHighlights();
    }

    if (dragPreview) { dragPreview.remove(); dragPreview = null; }
    draggedPiece = null; draggedFromGrid = null; draggedFromCraft = false;
    currentSnapCol = null; currentSnapPos = null; draggedTrayIndex = -1;
}

function onDragEnd(e) {
    document.removeEventListener('mousemove', onDragMove);
    document.removeEventListener('mouseup', onDragEnd);
    finishDrag(e.clientX, e.clientY);
}

function onTouchEnd(e) {
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onTouchEnd);
    const touch = e.changedTouches?.[0];
    finishDrag(touch?.clientX, touch?.clientY);
}

// ==================================================================
// ANSWER CHECKING
// ==================================================================
function checkAnswer(col) {
    const answer = currentLevelData.solution.find(s => s.col === col);
    if (!answer) return;
    const state = gridState[col];
    if (!state) return;

    const nameMatch = state.piece.name === answer.pieceName;
    const labelMatch = state.piece.label === answer.pieceLabel;
    const posMatch = Math.abs(state.position - answer.position) < 0.01;

    if (nameMatch && labelMatch && posMatch) {
        clearHintVisuals();
        sfx('correct');
        const el = document.querySelector(`.grid-column[data-col="${col}"] .placed-piece`);
        if (el) el.classList.add('piece-correct');

        const allSolved = currentLevelData.removeCols.every(c => isSolved(c));
        if (allSolved) {
            setTimeout(() => completeLevel(), 500);
        } else {
            const remaining = currentLevelData.removeCols.filter(c => !isSolved(c)).length;
            showToast(`Correct! ${remaining} more to go`, 'success');
            currentHintCol = null;
            currentHintLevel = 0;
            applyHighlights();
        }
    } else {
        wrongPlacements++;
        sfx('wrong');
        showToast('Not quite — try again', 'error');
        const el = document.querySelector(`.grid-column[data-col="${col}"] .placed-piece`);
        if (el) {
            el.style.animation = 'shake 0.4s ease';
            setTimeout(() => {
                // Return piece to tray
                const baseName = state.piece.name;
                if (baseName) {
                    const map = FLIP_MAP[baseName];
                    const wasFlipped = map && map.flipH && state.piece.label === map.flipH;
                    trayAvailable.push(baseName);
                    trayFlipState.push(!!wasFlipped);
                    renderTray();
                }
                gridState[col] = null;
                renderGrid();
                applyHighlights();
            }, 400);
        }
    }
}

function completeLevel() {
    if (timerInterval) clearInterval(timerInterval);
    const elapsed = Math.floor((Date.now() - levelStartTime) / 1000);
    const stars = calculateStars(elapsed);

    const prev = getLevelProgress(currentLevel);
    gameProgress[currentLevel] = {
        completed: true,
        stars: Math.max(prev.stars || 0, stars),
        bestTime: prev.bestTime ? Math.min(prev.bestTime, elapsed) : elapsed
    };
    saveProgress();
    sfx('complete');
    showSuccessModal(stars, elapsed);
}

function calculateStars(elapsed) {
    if (hintsUsed === 0 && wrongPlacements === 0 && elapsed <= (currentLevelData.timeThreshold || 999)) return 3;
    if (hintsUsed <= 1 && wrongPlacements === 0) return 2;
    return 1;
}

// ==================================================================
// HINTS

const HINT_DESCRIPTIONS = {
    'Arpeggio Ascending': 'The melody moves upward through the chord tones.',
    'Arpeggio Descending': 'The melody moves downward through the chord tones.',
    'Approach Ascending': 'The melody steps upward into the target note.',
    'Approach Descending': 'The melody steps downward into the target note.',
    'Neighbor From Above': 'The melody decorates the target note from above.',
    'Neighbor From Below': 'The melody decorates the target note from below.',
    'Enclosure': 'The melody circles around the target note from both sides.'
};

function useHint() {
    if (hintsRemaining <= 0) return;
    sfx('hint');

    // 1st hint globally per level: tempo slider
    if (currentHintLevel === 0) {
        currentHintLevel = 1;
        hintsUsed++;
        hintsRemaining--;
        updateHintButton();
        clearHintVisuals();
        showTempoHint();
        return;
    }

    // 2nd+ hint: position-based hints per column
    const unsolved = currentLevelData.removeCols.filter(c => !isSolved(c));
    if (unsolved.length === 0) return;

    if (currentHintCol === null || isSolved(currentHintCol)) {
        currentHintCol = unsolved[Math.floor(Math.random() * unsolved.length)];
        currentHintLevel = 1; // reset column-level hint
    }

    currentHintLevel++;
    hintsUsed++;
    hintsRemaining--;
    updateHintButton();
    clearHintVisuals();

    const answer = currentLevelData.solution.find(s => s.col === currentHintCol);
    if (!answer) return;

    if (currentHintLevel === 2) {
        showPositionHint(answer);
    } else {
        showPositionHint(answer);
        showOptionsHint(answer);
    }
}

function clearHintVisuals() {
    document.querySelectorAll('.hint-ghost,.hint-options-popup').forEach(el => el.remove());
    document.getElementById('hint-toast').classList.add('hidden');

}

function showPositionHint(answer) {
    const colEl = document.querySelector(`.grid-column[data-col="${answer.col}"]`);
    if (!colEl) return;
    const firstCell = colEl.querySelector('.grid-cell');
    if (!firstCell) return;
    const cellH = firstCell.offsetHeight;
    const cellGap = window.innerWidth <= 480 ? 8 : 12;
    const ghost = document.createElement('div');
    ghost.className = 'hint-ghost';
    ghost.style.top = (answer.position * (cellH + cellGap)) + 'px';
    ghost.style.height = cellH + 'px';
    colEl.appendChild(ghost);
}

function showOptionsHint(answer) {
    const colEl = document.querySelector(`.grid-column[data-col="${answer.col}"]`);
    if (!colEl) return;
    const firstCell = colEl.querySelector('.grid-cell');
    if (!firstCell) return;
    const cellH = firstCell.offsetHeight;
    const cellGap = window.innerWidth <= 480 ? 8 : 12;
    const ghostTop = answer.position * (cellH + cellGap);

    const correctPiece = findPiece(answer.pieceName, answer.pieceLabel);
    const candidates = library.filter(p => p.name !== 'Target' && !(p.name === answer.pieceName && p.label === answer.pieceLabel));
    const shuffled = [...candidates].sort(() => Math.random() - 0.5);
    const wrongPieces = shuffled.slice(0, 2);
    const options = [correctPiece, ...wrongPieces].sort(() => Math.random() - 0.5);

    const popup = document.createElement('div');
    popup.className = 'hint-options-popup';
    popup.style.top = (ghostTop - 80) + 'px';
    popup.style.left = '50%';
    popup.style.transform = 'translateX(-50%)';

    options.forEach(piece => {
        const opt = document.createElement('div');
        opt.className = 'hint-piece-option';
        opt.innerHTML = `<img src="${piece.thumbnail}" style="width:44px;height:44px;border-radius:6px;" draggable="false">
            <div class="hint-piece-option-label">${piece.name}</div>`;
        opt.addEventListener('click', () => {
            if (piece.name === correctPiece.name && piece.label === correctPiece.label) {
                popup.remove();
                const sel = answer.selectedIntervals || selectRandomIntervals(piece);
                gridState[answer.col] = { piece, position: answer.position, selectedIntervals: sel };
                renderGrid(); applyHighlights();
                checkAnswer(answer.col);
            } else {
                opt.style.animation = 'none'; opt.offsetHeight;
                opt.style.borderColor = 'var(--red)';
                opt.style.background = 'rgba(248,113,113,0.1)';
                opt.style.animation = 'shake 0.4s ease';
                setTimeout(() => opt.remove(), 400);
            }
        });
        popup.appendChild(opt);
    });
    colEl.appendChild(popup);
}

    const btn = document.getElementById('hint-btn');
    btn.classList.toggle('disabled', hintsRemaining <= 0);

// PLAYBACK
// ==================================================================
function playMelody() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const notes = fullMelodyNotes;
    if (!notes || !notes.targetNote) return;

    isPlaying = true;
    const btn = document.getElementById('play-btn');
    btn.textContent = '■';
    btn.classList.add('playing');

    let currentTime = audioCtx.currentTime + 0.1;

    for (let col = 0; col < numCols; col++) {
        const colNotes = notes.pieceNotes[col] || [];
        const colStart = currentTime;
        const delayMs = (colStart - audioCtx.currentTime) * 1000;

        const tOn = setTimeout(() => {
            document.querySelectorAll('.playhead-active').forEach(el => el.classList.remove('playhead-active'));
            const colEl = document.querySelector(`.grid-column[data-col="${col}"]`);
            if (colEl) colEl.querySelectorAll('.grid-cell').forEach(c => c.classList.add('playhead-active'));
        }, delayMs);
        playbackTimeouts.push(tOn);

        const eighth = getEighth();
        colNotes.forEach(midi => {
            playNote(midiToFreq(midi), currentTime, eighth * 0.9);
            currentTime += eighth;
        });
    }

    // Target note
    const eighth = getEighth();
    const tDelay = (currentTime - audioCtx.currentTime) * 1000;
    const tT = setTimeout(() => {
        document.querySelectorAll('.playhead-active').forEach(el => el.classList.remove('playhead-active'));
        const colEl = document.querySelector(`.grid-column[data-col="${numCols}"]`);
        if (colEl) colEl.querySelectorAll('.grid-cell').forEach(c => c.classList.add('playhead-active'));
    }, tDelay);
    playbackTimeouts.push(tT);

    playNote(midiToFreq(notes.targetNote), currentTime, eighth * 2);
    currentTime += eighth * 2;

    const totalMs = (currentTime - audioCtx.currentTime) * 1000 + 200;
    playbackTimeouts.push(setTimeout(() => stopPlayback(), totalMs));
}

    const idx = chapterLevels.findIndex(l => l.id === currentLevel);

    // Check if this was the last level in the chapter → show reward if applicable
    if (idx === chapterLevels.length - 1) {
        const ch = CHAPTERS.find(c => c.id === currentLevelData.chapter);
        const nextCh = CHAPTERS.find(c => c.id === currentLevelData.chapter + 1);
        if (nextCh && nextCh.reward && !gameProgress['_reward_' + nextCh.reward]) {
            showRewardScreen(nextCh.reward);
            return;
        }
        // Navigate to next chapter tab if it exists and is unlocked
        if (nextCh && getTotalStars() >= nextCh.unlockStars) {
            activeChapterTab = nextCh.id;
        }
        goToMap();
    } else {
        startLevel(chapterLevels[idx + 1].id);
    }
}

// ==================================================================
// SOUND DESIGN — Jazz-flavored SFX engine
// ==================================================================
let sfxCtx = null;
let settings = { volMusic: 0.8, volSfx: 0.8 };

function ensureSfxCtx() {
    if (!sfxCtx || sfxCtx.state === 'closed') sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (sfxCtx.state === 'suspended') sfxCtx.resume();
    return sfxCtx;
}

function sfx(name) {
    try {
        const ctx = ensureSfxCtx();
        const vol = settings.volSfx;
        if (vol <= 0) return;
        const t = ctx.currentTime;
        const sfxMap = {
            place:    () => sfxTone(ctx, t, [523.25, 659.25], 0.12, vol * 0.35, 'sine'),
            correct:  () => sfxChord(ctx, t, [523.25, 659.25, 783.99], 0.25, vol * 0.3),
            wrong:    () => { sfxTone(ctx, t, [311, 293], 0.08, vol * 0.25, 'sawtooth'); sfxTone(ctx, t + 0.08, [293, 277], 0.08, vol * 0.25, 'sawtooth'); },
            complete: () => sfxArpeggio(ctx, t, [523.25, 659.25, 783.99, 1046.5], 0.1, vol * 0.3),
            flip:     () => sfxSweep(ctx, t, 400, 800, 0.15, vol * 0.2),
            dupe:     () => { sfxTone(ctx, t, [523.25], 0.06, vol * 0.2, 'sine'); sfxTone(ctx, t + 0.08, [523.25], 0.06, vol * 0.2, 'sine'); },
            claim:    () => sfxTone(ctx, t, [783.99, 1046.5], 0.18, vol * 0.25, 'sine'),
            hint:     () => sfxTone(ctx, t, [440, 523.25], 0.15, vol * 0.15, 'triangle'),
            star:     () => sfxTone(ctx, t, [880, 1108.73], 0.2, vol * 0.2, 'sine'),
            click:    () => sfxNoise(ctx, t, 0.03, vol * 0.08),
            error:    () => sfxNoise(ctx, t, 0.08, vol * 0.12),
        };
        if (sfxMap[name]) sfxMap[name]();
    } catch(e) { /* audio not available */ }
}

function sfxTone(ctx, t, freqs, dur, vol, type) {
    freqs.forEach((f, i) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(f, t);
        if (freqs.length > 1 && i < freqs.length - 1) {
            osc.frequency.linearRampToValueAtTime(freqs[i+1], t + dur);
        }
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol, t + 0.008);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(t); osc.stop(t + dur + 0.05);
    });
}

function sfxChord(ctx, t, freqs, dur, vol) {
    freqs.forEach(f => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol / freqs.length, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(t); osc.stop(t + dur + 0.05);
    });
}

function sfxArpeggio(ctx, t, freqs, gap, vol) {
    freqs.forEach((f, i) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        const start = t + i * gap;
        g.gain.setValueAtTime(0, start);
        g.gain.linearRampToValueAtTime(vol, start + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, start + 0.3);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(start); osc.stop(start + 0.35);
    });
}

function sfxSweep(ctx, t, f1, f2, dur, vol) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f1, t);
    osc.frequency.exponentialRampToValueAtTime(f2, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(t); osc.stop(t + dur + 0.05);
}

function sfxNoise(ctx, t, dur, vol) {
    const bufSize = ctx.sampleRate * dur;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 2000;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(hp); hp.connect(g); g.connect(ctx.destination);
    src.start(t); src.stop(t + dur + 0.01);
}

// Override playNote to respect music volume
const _origPlayNote = playNote;
playNote = function(freq, startTime, duration) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    osc.type = 'triangle';
    filter.type = 'lowpass';
    filter.frequency.value = 2000;
    const v = settings.volMusic * 0.45;
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(v, startTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(v * 0.56, startTime + 0.1);
    gain.gain.setValueAtTime(v * 0.56, startTime + duration - 0.1);
    gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
    osc.frequency.value = freq;
    osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    osc.start(startTime); osc.stop(startTime + duration + 0.1);
};

// ==================================================================
// SCREEN TRANSITIONS — directional slides
// ==================================================================
let lastScreen = null;

const _origShowScreen = showScreen;
showScreen = function(name) {
    const prev = lastScreen;
    lastScreen = name;

    // First call (init) — use simple instant show
    if (!prev) {
        _origShowScreen(name);
        if (name === 'settings') applySettingsUI();
        return;
    }

    // Direction logic: landing→map→puzzle (forward), reverse is back
    const order = ['landing', 'settings', 'map', 'puzzle'];
    const prevIdx = order.indexOf(prev);
    const nextIdx = order.indexOf(name);
    const forward = nextIdx >= prevIdx;

    const allScreens = document.querySelectorAll('.screen');
    const target = document.getElementById('screen-' + name);
    if (!target) return;

    // Slide out current
    allScreens.forEach(s => {
        if (s.classList.contains('active')) {
            s.classList.remove('active');
            s.classList.add(forward ? 'slide-out-left' : 'slide-out-right');
            setTimeout(() => {
                s.classList.remove('slide-out-left', 'slide-out-right');
                s.classList.add('hidden');
            }, 400);
        } else if (!s.classList.contains('hidden')) {
            s.classList.add('hidden');
        }
    });

    // Slide in target
    target.classList.remove('hidden', 'slide-out-left', 'slide-out-right');
    target.classList.add(forward ? 'slide-in-right' : 'slide-in-left');
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            target.classList.remove('slide-in-right', 'slide-in-left');
            target.classList.add('active');
        });
    });

    if (name === 'map') renderMap();
    if (name === 'settings') applySettingsUI();
};

        desc: 'Drag pieces from the <strong>tray</strong> onto the grid. Each piece has <strong>entry and exit points</strong> that must align with neighboring pieces to form a valid melodic line.'
    },
    {
        icon: '⇌',
        title: 'The Craft Table',
        desc: 'Drop a piece on the <strong>Craft Table</strong> to <strong>flip</strong> it (reverse direction) or <strong>duplicate</strong> it (make a copy). Tap the result to claim it back.'
    },
    {
        icon: '⭐',
        title: 'Earn Stars',
        desc: 'Solve quickly with <strong>no hints or mistakes</strong> for 3 stars. Stars unlock new chapters with <strong>new piece types</strong> to master.'
    },
    {
        icon: '🎷',
        title: 'Ready to Play!',
        desc: 'Start with <strong>Arpeggios</strong> and work your way up through all 5 chapters. Press <strong>▶</strong> anytime to hear how your melody sounds!'
    }
];

let onboardStep = 0;

function shouldShowOnboarding() {
    return !localStorage.getItem('bebopOnboardDone') && getTotalStars() === 0;
}

function startOnboarding() {
    onboardStep = 0;
    renderOnboardStep();
    document.getElementById('onboard-overlay').classList.remove('hidden');
}

function renderOnboardStep() {
    const step = ONBOARD_STEPS[onboardStep];
    document.getElementById('onboard-icon').textContent = step.icon;
    document.getElementById('onboard-title').textContent = step.title;
    document.getElementById('onboard-desc').innerHTML = step.desc;

    // Dots
    const dots = document.getElementById('onboard-dots');
    dots.innerHTML = '';
    ONBOARD_STEPS.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'onboard-dot' + (i === onboardStep ? ' active' : i < onboardStep ? ' done' : '');
        dots.appendChild(d);
    });

    // Button text
    const btn = document.getElementById('onboard-next');
    btn.textContent = onboardStep === ONBOARD_STEPS.length - 1 ? "Let's Go!" : 'Next';
}

function nextOnboardStep() {
    sfx('click');
    onboardStep++;
    if (onboardStep >= ONBOARD_STEPS.length) {
        skipOnboarding();
        return;
    }
    renderOnboardStep();
}

function skipOnboarding() {
    localStorage.setItem('bebopOnboardDone', '1');
    document.getElementById('onboard-overlay').classList.add('hidden');
    showScreen('map');
}

function onPlayPressed() {
    sfx('click');
    if (shouldShowOnboarding()) {
        startOnboarding();
    } else {
        showScreen('map');
    }
}

// ==================================================================
// INIT
// ==================================================================
async function init() {
    loadProgress();
    loadSettings();

    // Try inline data first (works from file://), fallback to fetch
    if (typeof DEFAULT_LIBRARY_DATA !== 'undefined' && DEFAULT_LIBRARY_DATA.library) {
        library = DEFAULT_LIBRARY_DATA.library;
    } else {
        try {
            const resp = await fetch('default-library.json');
            if (resp.ok) {
                const data = await resp.json();
                if (data.library) library = data.library;
            }
        } catch(e) { console.warn('Failed to load library:', e); }
    }

    library.forEach(p => enrichPieceConnectionData(p));
    initCraftOutput();
    showScreen('landing');
}

document.addEventListener('DOMContentLoaded', init);

window.addEventListener('resize', () => {
    if (document.getElementById('screen-puzzle').classList.contains('active')) {
        sizeCells();
        renderGrid();
        applyHighlights();
    }
});
</script>
